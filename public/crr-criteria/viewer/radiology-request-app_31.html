        // Helper function to determine if criterion approves imaging or requires alternative pathway
        const getCriterionApprovalStatus = (criterion) => {
            // Alternative pathway indicators
            if (criterion.priority === 'not-funded') {
                return 'alternative';
            }
            
            // Check if action indicates referral without imaging
            if (criterion.action) {
                const lowerAction = criterion.action.toLowerCase();
                if (lowerAction.includes('refer for') && 
                    (lowerAction.includes('without') || 
                     lowerAction.includes('assessment') ||
                     lowerAction.includes('alternative'))) {
                    return 'alternative';
                }
            }
            
            // Otherwise it's approved for imaging
            return 'approved';
        };

            }

        // Enhanced AI Search with Natural Language Processing
        const extractMedicalTerms = (text) => {
            // Remove common filler words and extract medical terms
            const stopWords = ['patient', 'presented', 'with', 'has', 'had', 'history', 'of', 
                             'showing', 'showed', 'shows', 'the', 'a', 'an', 'and', 'or', 
                             'was', 'were', 'been', 'being', 'have', 'last', 'recent'];
            
            const words = text.toLowerCase()
                .replace(/[,\.;:!?()]/g, ' ')  // Replace punctuation with spaces
                .split(/\s+/)
                .filter(word => word.length > 2 && !stopWords.includes(word));
            
            return words;
        };

        // Enhanced search function for both keyword and natural language
        const enhancedSearch = (criteria, query) => {
            if (!query || query.length < 3) return criteria;
            
            // Extract medical terms from natural language
            const searchTerms = extractMedicalTerms(query);
            const fullQuery = query.toLowerCase();
            
            return criteria.filter(criterion => {
                const searchText = `
                    ${criterion.presentation}
                    ${criterion.details?.join(' ') || ''}
                    ${criterion.action || ''}
                    ${criterion.source || ''}
                `.toLowerCase();

                let score = 0;
                
                // Full query match (highest priority)
                if (searchText.includes(fullQuery)) score += 10;
                
                // Individual term matches
                searchTerms.forEach(term => {
                    if (searchText.includes(term)) score += 1;
                });

                // Priority medical keywords
                const priorityKeywords = ['chest', 'pain', 'headache', 'cancer', 'bleeding', 
                                        'acute', 'suspected', 'fracture', 'haemoptysis', 
                                        'seizure', 'tia', 'stroke', 'lesion', 'lung', 'mass'];
                priorityKeywords.forEach(pk => {
                    if (searchTerms.includes(pk) && searchText.includes(pk)) score += 2;
                });

                return score > 0;
            });
        };

                                            <div className="mt-6 pt-4 border-t border-white/20">
                                                <p className="text-sm opacity-90">
                                                    <strong>Important:</strong> This is clinical decision support. Always consider individual patient circumstances and consult PCRL if uncertain.
                                                </p>
                                            </div>
                                        </div>
                                    )}

                                    {/* Legend */}
                                    <div className="bg-gradient-to-br from-gray-50 to-gray-100 rounded-lg p-6">
                                        <h3 className="font-semibold text-gray-900 mb-3">Decision Legend</h3>
                                        <div className="space-y-3 text-sm">
                                            <div className="flex items-start gap-2">
                                                <span className="text-xl text-green-600">✓</span>
                                                <div>
                                                    <div className="font-medium text-green-800">CRR Imaging Approved</div>
                                                    <div className="text-gray-600 text-xs">Patient meets criteria for community radiology</div>
                                                </div>
                                            </div>
                                            <div className="flex items-start gap-2">
                                                <span className="text-xl text-amber-600">→</span>
                                                <div>
                                                    <div className="font-medium text-amber-800">Alternative Pathway</div>
                                                    <div className="text-gray-600 text-xs">Refer to specialist or alternative management</div>
                                                </div>
                                            </div>
                                            <div className="flex items-start gap-2">
                                                <span className="text-xl text-red-600">⚠</span>
                                                <div>
                                                    <div className="font-medium text-red-800">Mixed Selection</div>
                                                    <div className="text-gray-600 text-xs">Review - conflicting criteria selected</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="mt-8 text-center text-sm text-gray-500">
                            <p>National Community Referral Criteria for Imaging (Phase 1) | Version 1.0 | Published: 24/09/2025</p>
                            <p className="mt-1">Te Whatu Ora - Health New Zealand | National Radiology Network</p>
                        </div>

                        {/* Version Footer */}
                        <div className="mt-8 pt-6 border-t border-gray-200 text-center text-xs text-gray-500">
                            <p>
                                <strong>Version 1.3.0</strong> | Proof of Concept | Last Updated: 02/01/2026
                            </p>
                            <p className="mt-1">
                                National Primary Care Referral Criteria for Imaging - Phase 1 (Published 24/09/2025)
                            </p>
                            <p className="mt-1 text-amber-600">
                                ⚠️ For evaluation purposes only - Not clinically validated for production use
                            </p>
                        </div>

                    </div>
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
