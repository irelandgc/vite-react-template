<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRR Referral Criteria</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#1a2733;background:#f5f7f9}
a{color:#006B6B}

/* header */
.hd{background:#003B5C;color:#fff;padding:10px 14px}
.hd-title{font-size:15px;font-weight:700}
.hd-sub{font-size:11px;color:#8ab8d4;margin-top:2px}

/* content */
.content{padding:12px 14px}

/* guidance */
.guidance{background:#e8f4f8;border-left:3px solid #006B6B;padding:8px 10px;margin-bottom:10px;font-size:12px;color:#1a3a4a;line-height:1.5}

/* inline guidance */
.inline-g{background:#e8f8ee;border-left:3px solid #2a7a40;padding:6px 10px;margin-bottom:8px;font-size:12px;color:#1a3a2a;line-height:1.5}

/* site heading */
.site-hd{font-size:13px;font-weight:700;color:#003B5C;padding:8px 0 4px;border-bottom:2px solid #003B5C;margin-bottom:8px;margin-top:4px}

/* group */
.group{margin-bottom:10px}
.group-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;padding:4px 8px;background:#e8edf2;color:#003B5C;margin-bottom:5px}

/* priority badges */
.b-em{background:#fdecea;color:#c62828;padding:1px 6px;font-size:10px;font-weight:700;margin-left:5px}
.b-ac{background:#fff3e0;color:#b45309;padding:1px 6px;font-size:10px;font-weight:700;margin-left:5px}
.b-p2{background:#faf5ff;color:#9333ea;padding:1px 6px;font-size:10px;font-weight:700;margin-left:5px}
.b-p3{background:#eff6ff;color:#2563eb;padding:1px 6px;font-size:10px;font-weight:700;margin-left:5px}
.b-p4{background:#ecfeff;color:#0891b2;padding:1px 6px;font-size:10px;font-weight:700;margin-left:5px}

/* items */
.item{padding:4px 4px 4px 2px;border-bottom:1px solid #eef1f4}
.item:last-child{border-bottom:none}
.item input[type=checkbox]{margin-right:6px;vertical-align:middle;cursor:pointer}
.item label{cursor:pointer;vertical-align:middle;line-height:1.4}
input[type=checkbox]:checked + label{color:#006B6B;font-weight:600}
.mandatory{color:#c62828;font-weight:700;font-size:11px;margin-left:4px}

/* out of criteria */
.ooc{background:#fffbeb;border-left:3px solid #f59e0b;padding:6px 10px;margin-top:8px;font-size:11px;color:#78350f}
.ooc-hd{font-weight:700;margin-bottom:2px}

/* alt management */
.alt{background:#f0f9ff;border-left:3px solid #0284c7;padding:6px 10px;margin-top:6px;font-size:11px;color:#0c4a6e}

/* site list */
.site-list{list-style:none;margin-top:6px}
.site-list li{margin-bottom:5px}
.site-list a{display:block;padding:6px 10px;background:#fff;border:1px solid #c8d8e4;color:#006B6B;font-weight:600;text-decoration:none}
.site-list a:hover{background:#e8f4f8}

/* exam list */
.exam-list{list-style:none}
.exam-list li{margin-bottom:5px}
.exam-list a{display:block;padding:7px 10px;background:#fff;border:1px solid #c8d8e4;color:#003B5C;font-weight:700;text-decoration:none}
.exam-list .mod{font-size:10px;font-weight:400;color:#5a7a8a;margin-left:6px;text-transform:uppercase;letter-spacing:0.4px}
.exam-list a:hover{background:#e8f4f8}

/* error */
.err{padding:20px;color:#c62828}

/* footer */
.footer{padding:6px 14px;font-size:10px;color:#8a9aab;border-top:1px solid #e0e8f0;margin-top:10px}

/* print */
@media print{
  body{background:#fff}
  .hd{background:#003B5C!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .item input[type=checkbox]{display:none}
  .item label{margin-left:14px}
  input[type=checkbox]:checked + label{color:inherit;font-weight:inherit}
  .footer{display:none}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
var CRITERIA = {"version":{"major":3,"minor":4,"patch":2,"date":"2026-03-19","label":"v3.4.4 — 2026-03-20","criteriaSource":"National Community Referral Criteria for Imaging (Part I), August 2025 reissue"},"exams":[{"id":"ct","title":"CT","modality":"CT","type":"multisite","active":true,"guidance":"Select the anatomical site(s) being requested, then complete the clinical indicators for each site. Review the National Community Referral Criteria for Imaging and HealthPathways before referring.","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=20717.htm","sites":[{"id":"ct_head","label":"Head","inlineGuidance":"For suspected TIA within 7 days: completion of the BPAC TIA decision support tool is required to confirm CT Head appropriate. For first seizure, MRI is the preferred first-line investigation where available.","groups":[{"title":"Acute — within 48 hours","items":[{"type":"cb","id":"cth_a1","label":"Suspected TIA — within 7 days of episode, AND CT +/- CTA recommended by HNZ neurologist/stroke specialist OR BPAC TIA decision support tool indicates CT appropriate OR patient unable to access rapid specialist care","shortLabel":"Suspected TIA — within 7 days, meets criteria"},{"type":"cb","id":"cth_a2","label":"Focal neurological signs","shortLabel":"Focal neurological signs"},{"type":"cb","id":"cth_a3","label":"Seizure in a palliative care setting and result may change management","shortLabel":"Seizure in palliative care — result will change management"},{"type":"cb","id":"cth_a4","label":"Secondary care clinician or PCRL or radiologist advises referral for same or next day CT scan","shortLabel":"Advised by secondary care / PCRL / radiologist (same/next day)"}]},{"title":"P2 — Urgent, within 2 weeks","items":[{"type":"cb","id":"cth_p2_1","label":"Change in pattern of headaches with progressive increase in frequency or severity (especially aged 50+) AND associated with chronic illness with potential cerebral complications (especially malignancy), OR exacerbated by coughing/sneezing/Valsalva (not typical migraine), OR associated with persistent nausea/vomiting (not typical migraine), OR objective neurological deficit","shortLabel":"Progressive/changing headache pattern (aged 50+) with concerning features"},{"type":"cb","id":"cth_p2_2","label":"Cognitive impairment with one or more features suggesting space-occupying lesion, bleed, or hydrocephalus: rapid cognitive decline over weeks; focal neurological signs; history of falls; anticoagulant therapy; gait ataxia or incontinence; history of cancers with propensity to brain metastases (lung, melanoma, breast)","shortLabel":"Cognitive impairment with features of SOL / bleed / hydrocephalus"},{"type":"cb","id":"cth_p2_3","label":"First seizure aged 21 years or older — clear history, patient low risk, OR MRI not available","shortLabel":"First seizure aged 21+, low risk or MRI unavailable"},{"type":"cb","id":"cth_p2_4","label":"Secondary care clinician or PCRL or radiologist advises referral for urgent CT scan","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)"}]},{"title":"P4 — Deferrable, within 6–12 weeks","items":[{"type":"cb","id":"cth_p4_1","label":"Cognitive impairment without features suggesting SOL, bleed, or hydrocephalus — and establishing the subtype diagnosis will alter management","shortLabel":"Cognitive impairment — subtype diagnosis will alter management"},{"type":"cb","id":"cth_p4_2","label":"Secondary care clinician or PCRL or radiologist advises referral for non-urgent CT scan","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)"}]}],"outOfCriteriaNote":"Established advanced dementia >2 years, no unexpected change, subtype will not alter management — not routinely funded. Seizures with risk factors for intracranial pathology — seek Neurology phone advice rather than CT.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=15616.htm","guidanceNarrative":"For clinically suspected anterior circulation TIA events, if the patient is a potential candidate for carotid endarterectomy, carotid angiography (CTA) or if unavailable carotid ultrasound should be added to the CT head exam.","alternativeManagement":"Seizures with risk factors for intracranial pathology — seek Neurology phone advice. Poorly controlled or recurrent seizures — follow the appropriate pathway (Epilepsy in Adults, Epilepsy in Women, First Seizure in Adults, Seizure in Palliative Care HealthPathways).","notFundedDetail":"Established advanced dementia of more than 2 years duration, no unexpected change in disease progression and establishing the subtype will not alter management.","footnotes":"*1 High risk features for TIA: less than 59 years old; ABCD2 greater than 4; crescendo TIAs; atrial fibrillation; on anticoagulants; severe or prolonged deficit (hemiparesis longer than 60 minutes); known carotid artery stenosis.\n*2 Features suggestive of underlying SOL, bleed, or hydrocephalus: rapid cognitive decline over weeks; presence of focal neurological signs; history of falls; anticoagulant therapy; gait ataxia or incontinence; history of cancers with propensity to brain metastases (lung, melanoma, breast).\n*3 Criteria for low-risk first seizure — all of the following must apply: single seizure which is unprovoked or provoked by a known substance; patient has since returned to normal health; none of the following risk factors for intracranial pathology apply: head injury, aged older than 40, fever/systemic symptoms, history of anticoagulation or malignancy, new focal neurologic deficit, focal seizure, persistent altered mental state, persistent headache.\n*4 Risk factors for intracranial pathology: head injury; aged older than 40; fever/systemic symptoms; history of anticoagulation or malignancy; new focal neurologic deficit; focal seizure; persistent altered mental state; persistent headache."},{"id":"ct_cap","label":"Chest/Abdomen/Pelvis","inlineGuidance":"Reserve for patients where after initial investigations the GP remains strongly suspicious of malignancy but no focal pathology or biopsy site is identified. Two or more persistently abnormal bloods (Hb, CRP, Ca, ALP) significantly increases probability of cancer.","groups":[{"title":"P2 — Urgent, within 2 weeks","items":[{"type":"cb","id":"ctcap_1","label":"Male >50 or female >60 with strong suspicion of malignancy, no focal pathology, AND unintentional unexplained weight loss >5% over 3–6 months (+/- abdominal pain, fatigue, nausea)","shortLabel":"Male >50 / female >60, unexplained weight loss >5%, strong malignancy suspicion"},{"type":"cb","id":"ctcap_2","label":"Male >40 or female >50 with strong suspicion of malignancy, no focal pathology, AND weight loss >5% over 3–6 months AND 2+ of: raised CRP, low Hb, raised Ca, high platelets, high ALP, low albumin — persistent on repeat after 3 weeks","shortLabel":"Male >40 / female >50, weight loss >5%, 2+ abnormal bloods persisting"},{"type":"cb","id":"ctcap_3","label":"Secondary care clinician, PCRL or radiologist advises referral for urgent CT Chest, Abdomen and Pelvis","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)"}]}],"outOfCriteriaNote":"Not indicated where: current cancer under follow-up; investigated by secondary care within 12 months for same symptoms; localising features on initial investigations; recent USS abdomen/pelvis within 3 months; CT CAP within 12 months.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=17650.htm","guidanceNarrative":"This pathway covers patients with nonspecific symptoms where the GP suspects underlying primary or secondary malignancy in the abdomen or pelvis, with no localising features or mass for tissue sampling evident on examination or initial investigations. The presence of two or more persistently abnormal blood test results (Hb, CRP, Ca, ALP) significantly increases the probability of cancer being diagnosed. CT CAP should be reserved for patients where after initial investigations and review the GP remains strongly suspicious of underlying malignancy. For presentations with nonspecific symptoms and abnormal lab results not meeting criteria, discussion with PCRL or secondary care specialist or radiologist for consideration of CT imaging is recommended.","alternativeManagement":"Not indicated where: patient has a current cancer diagnosis and is under continued follow-up; patient has been investigated by secondary care within the last 12 months for the same symptoms/signs; presentation requires urgent admission or urgent secondary care assessment; localising clinical features or results from preliminary investigations suggest cancer in a specific system; recent ultrasound of abdomen and pelvis within the last three months (seek advice from radiologist or secondary care specialist); CT Chest, Abdomen and Pelvis within the last 12 months (seek advice from radiologist or secondary care specialist).","notFundedDetail":"Patient is unfit for treatment or unwilling to have further investigations and/or treatment.","footnotes":""},{"id":"ct_chest","label":"Chest","inlineGuidance":"Urgent CXR (same or next day) remains the initial investigation where lung cancer is suspected. CT Chest is a subsequent step. A normal CXR does not exclude lung cancer (sensitivity ~75–80%).","groups":[{"title":"P2 — Urgent, within 2 weeks","items":[{"type":"cb","id":"ctc_p2_1","label":"Unexplained haemoptysis (in absence of chest infection, upper respiratory tract causes excluded) AND investigations including CXR fail to identify a cause","shortLabel":"Unexplained haemoptysis — CXR negative, no infection"},{"type":"cb","id":"ctc_p2_2","label":"Aged over 55 years, current smoker, AND one or more new onset concerning symptoms for lung cancer persistent for 6 weeks despite appropriate treatment AND unexplained despite CXR and bloods","shortLabel":"Smoker >55, new lung cancer symptoms >6 weeks, CXR/bloods inconclusive"},{"type":"cb","id":"ctc_p2_3","label":"Indeterminate abnormality on CXR raising possibility of lung cancer (e.g. bulky hilum) AND CT chest recommended in radiology report","shortLabel":"Indeterminate CXR abnormality — CT recommended in report"},{"type":"cb","id":"ctc_p2_4","label":"Persistent consolidation on 6-week follow-up CXR AND CT chest recommended in radiology report","shortLabel":"Persistent consolidation on 6-week CXR — CT recommended in report"},{"type":"cb","id":"ctc_p2_5","label":"Secondary care clinician or radiologist advises urgent staging CT chest/liver for suspicious lesion on CXR AND CT is advised next step on local HealthPathway","shortLabel":"Staging CT advised by secondary care for suspicious CXR lesion"},{"type":"cb","id":"ctc_p2_6","label":"Secondary care clinician, PCRL or radiologist advises referral for urgent CT chest","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)"}]},{"title":"P3 — Non-deferrable, within 6 weeks","items":[{"type":"cb","id":"ctc_p3_1","label":"Isolated pulmonary nodule identified on CXR, cannot be confirmed as benign from x-ray appearances alone, AND referral for CT chest recommended in radiology report","shortLabel":"Isolated pulmonary nodule on CXR — CT recommended in report"},{"type":"cb","id":"ctc_p3_2","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent CT chest","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)"}]}],"outOfCriteriaNote":"Initial presentation with respiratory symptoms: refer for urgent CXR first. Re-presentation with normal CXR but not meeting CT criteria: seek advice from secondary care respiratory team.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=448214.htm","guidanceNarrative":"A diagnosis of lung cancer and initiating imaging investigations should be considered for all patients with concerning symptoms or signs lasting more than 3 weeks, or sooner if the patient has risk factors for lung cancer. Patients who identify as Māori have higher rates of lung cancer than non-Māori and a lower threshold for investigating concerning symptoms or signs should be considered especially if the patient has risk factors. Urgent CXR (same or next day) remains the initial investigation of choice for symptomatic patients where lung cancer is suspected. Studies suggest the sensitivity of a CXR is around 75-80%, highlighting the importance of safety netting for symptomatic patients with a normal CXR. The presence of multiple signs and symptoms, particularly in combination with haemoptysis, weight loss or persistent thrombocytosis, has a significantly stronger positive predictive value for lung cancer. Regarding CT after normal CXR: it is not yet clear how or when to select patients for CT in the presence of a normal CXR due to the low predictive value of symptoms. The overall incidence of lung cancer amongst CXR referrals is approximately 1.4%. Studies show the risk can be stratified using patient age and smoking status — current-smokers aged over 55 years are proposed as the threshold for CT after normal CXR.","alternativeManagement":"Patient re-presents with concerning symptoms and CXR is normal but doesn't meet CT criteria — seek advice from secondary care respiratory team regarding appropriate management and whether CT chest is warranted. Persistent non-specific non-localising symptoms concerning for underlying cancer (e.g. weight loss, fatigue) and initial investigations including CXR and bloods fail to identify a cause — see CT Chest/Abdomen/Pelvis HealthPathway. Initial presentation with respiratory symptoms or signs concerning for lung cancer — refer for urgent CXR as the initial investigation. Follow-up of nodule discovered incidentally on CT chest scan — refer to secondary care for management advice unless radiology report confirms benign.","notFundedDetail":"","footnotes":"*1 Concerning symptoms and signs for lung cancer: unexplained new or worsening dyspnoea; unexplained cough persisting and worsening for more than 3 weeks; unexplained chest and/or shoulder pain persisting for more than 3 weeks; unexplained changes in existing symptoms in patients with underlying chronic respiratory problems persisting for more than 3 weeks; unexplained hoarseness persisting for more than 3 weeks; recurrent or unresolved chest infections; persistent unexplained haemoptysis in the absence of red flags; unexplained weight loss and loss of appetite persisting for more than 3 weeks; unexplained abnormal chest signs persisting more than 3 weeks; new supraclavicular lymphadenopathy; new cervical lymphadenopathy persisting more than 3 weeks where nodes are greater than 1cm in a patient with other lung cancer symptoms/signs/risk factors; features suggestive of paraneoplastic syndromes.\n*2 Risk factors for lung cancer: current or past smoker (increased risk with duration and quantity; reduced risk with duration since quitting especially more than 15 years); family history of lung cancer in sibling; personal history of cancer especially head and neck cancer; history of lung disease including COPD, cystic fibrosis; exposure to asbestos, radon, air pollutants.\n*3 Safety netting after normal CXR: with sensitivity of CXR for lung cancer reported as 75-80%, a normal CXR may provide false reassurance. Safety netting is a diagnostic management strategy to ensure patients are monitored until symptoms are explained or resolved. Persistent or worsening unexplained respiratory symptoms, especially clusters of symptoms and especially in patients at increased risk of lung cancer, warrant further investigation despite a normal CXR by way of referral for CT or discussion with a secondary care clinician or PCRL.\n*4 Local pathways — direct to PET-CT: where CXR findings are suspicious for lung cancer but no features suggest it is not curable, the preferred next step in some districts is to proceed directly with whole body PET-CT rather than CT chest."},{"id":"ct_colonography","label":"Colonography (CTC)","inlineGuidance":"CTC may be appropriate where the patient is over 80, has co-morbidities making colonoscopy higher risk, has an abdominal mass, or following failed/incomplete colonoscopy. All referrals should go via secondary care single point of entry for triage to colonoscopy or CTC.","groups":[{"title":"P2 — Urgent, within 2 weeks","items":[{"type":"cb","id":"ctc_col_p2_1","label":"Altered bowel habit (looser and/or more frequent) >6 weeks PLUS unexplained rectal bleeding (benign anal causes treated or excluded), aged >50 years","shortLabel":"Altered bowel habit >6 wks + rectal bleeding, aged >50"},{"type":"cb","id":"ctc_col_p2_2","label":"Unexplained rectal bleeding (benign anal causes treated or excluded) WITH iron deficiency anaemia (Hb below reference range AND low ferritin)","shortLabel":"Rectal bleeding + iron deficiency anaemia"},{"type":"cb","id":"ctc_col_p2_3","label":"Known or suspected colorectal cancer (on imaging, palpable, or visible on rectal examination) — for pre-operative procedure to rule out synchronous pathology","shortLabel":"Known/suspected CRC — pre-operative synchronous pathology exclusion"},{"type":"cb","id":"ctc_col_p2_4","label":"Secondary care clinician or radiologist advises referral for urgent CTC","shortLabel":"Advised by secondary care / radiologist (urgent)"}]},{"title":"P3 — Non-deferrable, within 6 weeks","items":[{"type":"cb","id":"ctc_col_p3_1","label":"Altered bowel habit (looser and/or more frequent) >6 weeks, aged 50 years or older","shortLabel":"Altered bowel habit >6 wks, aged 50+"},{"type":"cb","id":"ctc_col_p3_2","label":"Altered bowel habit >6 weeks PLUS unexplained rectal bleeding (benign anal causes treated or excluded), aged 40-50 years","shortLabel":"Altered bowel habit >6 wks + rectal bleeding, aged 40-50"},{"type":"cb","id":"ctc_col_p3_3","label":"Unexplained rectal bleeding (benign anal causes treated or excluded), aged 50 years or older","shortLabel":"Rectal bleeding, aged 50+"},{"type":"cb","id":"ctc_col_p3_4","label":"Unexplained iron deficiency anaemia (Hb below local reference range AND low ferritin)","shortLabel":"Unexplained iron deficiency anaemia"},{"type":"cb","id":"ctc_col_p3_5","label":"NZGG Category 2 family history PLUS altered bowel habit >6 weeks PLUS unexplained rectal bleeding, aged 40 years or older","shortLabel":"NZGG Cat 2 family history + bowel symptoms, aged 40+"},{"type":"cb","id":"ctc_col_p3_6","label":"NZGG Category 3 family history PLUS altered bowel habit >6 weeks PLUS unexplained rectal bleeding, aged 25 years or older","shortLabel":"NZGG Cat 3 family history + bowel symptoms, aged 25+"},{"type":"cb","id":"ctc_col_p3_7","label":"Secondary care clinician or radiologist advises referral for non-urgent CTC","shortLabel":"Advised by secondary care / radiologist (non-urgent)"}]}],"outOfCriteriaNote":"Not indicated for: acute diarrhoea <6 weeks (likely infectious); IBS; constipation as single symptom; uncomplicated CT-proven diverticulitis; abdominal pain alone; low ferritin with normal Hb aged <50. All criteria require ability to tolerate bowel prep AND no colonoscopy/CTC within last 5 years (unless clear indication).","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=53111.htm","guidanceNarrative":"The Ministry of Health and Bowel Cancer Working Group recommendation is for all referrals for investigation of bowel symptoms meeting the direct access referral criteria to be referred to secondary care via a single point of entry and triaged to either colonoscopy or CT colonography (CTC). CTC may be appropriate where the patient is over 80 years, has significant co-morbidities where colonoscopy presents higher risk (e.g. respiratory risk from sedation), has an abdominal mass on examination, or following failed or incomplete colonoscopy. CTC is of comparable sensitivity to colonoscopy for the detection of clinically significant polyps and tumours. All referrals require: ability to tolerate bowel prep and the procedure and possible further treatment, and no previous colonoscopy or CTC within the last 5 years unless there is a clear indication to repeat.","alternativeManagement":"Rectal bleeding aged less than 50 years (normal haemoglobin) — consider secondary care referral for assessment and possible flexible sigmoidoscopy.","notFundedDetail":"Acute diarrhoea for less than six weeks duration where it most likely has an infectious aetiology. Irritable bowel syndrome. Constipation as a single symptom. Uncomplicated CT-proven diverticulitis without suspicious radiological features. Abdominal pain alone without P3 six-week category features. Low ferritin with normal haemoglobin in a patient aged younger than 50 years.","footnotes":"*1 NZGG family history categories:\nCategory 2 (moderately increased familial risk): one first-degree relative diagnosed with CRC under age 55, OR two first-degree relatives on the same side of the family with CRC at any age.\nCategory 3 (potentially high risk): family history of FAP, Lynch syndrome or other familial CRC syndromes; one first-degree relative plus two or more first- or second-degree relatives all on the same side with CRC at any age; two first-degree relatives or one first-degree relative plus one or more second-degree relatives all on the same side with CRC, and one such relative was diagnosed under age 54, or developed two or more bowel cancers, or developed an extracolonic tumour suggestive of Lynch syndrome (endometrial, ovarian, stomach, small bowel, renal pelvis, pancreas or brain); a first-degree relative with CRC diagnosed under age 50 where tumour immunohistochemistry has revealed loss of protein expression for one of the mismatch repair genes."},{"id":"ct_ivu","label":"IVU / CT Renal","inlineGuidance":"CT IVU is preferred for renal masses, painless haematuria, and obstruction. Contraindicated if eGFR <30 or iodinated contrast allergy — use renal ultrasound instead. CT KUB is a separate non-contrast scan for stone detection.","groups":[{"title":"P2 — Urgent, within 2 weeks","items":[{"type":"cb","id":"ctivu_p2_1","label":"Macroscopic haematuria where UTI excluded (or persists after treating UTI) AND patient aged 40-85 years","shortLabel":"Macroscopic haematuria, UTI excluded, aged 40-85"},{"type":"cb","id":"ctivu_p2_2","label":"Macroscopic haematuria where UTI excluded AND patient aged under 40, initial investigations including renal ultrasound normal, and haematuria persists","shortLabel":"Macroscopic haematuria, aged <40, renal US normal, persists"},{"type":"cb","id":"ctivu_p2_3","label":"Secondary care clinician, PCRL or radiologist advises referral for urgent CT IVU or CT Renal scan","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)"}]},{"title":"P3 — Non-deferrable, within 6 weeks","items":[{"type":"cb","id":"ctivu_p3_1","label":"CT IVU recommended by secondary care specialist for unexplained asymptomatic microscopic haematuria after initial investigations including renal tract ultrasound fail to identify a cause","shortLabel":"Asymptomatic microscopic haematuria — CT IVU recommended by secondary care"},{"type":"cb","id":"ctivu_p3_2","label":"Multiphase renal CT recommended by secondary care specialist or radiology report for incidental finding on ultrasound: solid lesion >1cm OR complex cyst (Bosniak IIF, III, or IV)","shortLabel":"Incidental solid lesion >1cm or complex Bosniak cyst on US — CT recommended"},{"type":"cb","id":"ctivu_p3_3","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent CT IVU or CT Renal scan","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)"}]}],"healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=177141.htm","guidanceNarrative":"CT IVU (also known as CT Urogram) is the best imaging investigation for renal masses, investigating painless haematuria, and causes of obstruction, but this is at the expense of increased radiation dose and the need for intravenous contrast. Images are obtained in 2 or 3 phases to image the kidneys in the nephrogenic phase and ureters and bladder in excretory phases. CT IVU together with cystoscopy should be used for older patients (40 years or older) with painless haematuria and in younger patients (less than 40 years) when initial investigations including ultrasound and cystoscopy are abnormal or if haematuria persists. CT IVU uses a high dose of iodine contrast media which can be nephrotoxic. CT IVU is not recommended for patients with reduced renal function (eGFR lower than 30) or with known allergy to iodinated contrast — renal ultrasound is the recommended investigation in these patient groups. CT KUB is a different non-contrast scan, primarily for detection and monitoring of stones.","alternativeManagement":"","notFundedDetail":"","footnotes":""},{"id":"ct_kub","label":"KUB","inlineGuidance":"For pregnant patients or females <35 without haematuria, fever, history of stones, or solitary kidney: request renal tract ultrasound instead. Consider plain X-ray KUB at same time. Avoid repeated CT KUB in otherwise healthy patients aged <50 with known stones and typical presentation without red flags.","groups":[{"title":"Refer for acute assessment — red flags (admit, do not image)","items":[{"type":"cb","id":"kub_acute_1","label":"Creatinine >160 mmol/L or eGFR <45 ml/min","shortLabel":"Creatinine >160 or eGFR <45"},{"type":"cb","id":"kub_acute_2","label":"Solitary kidney","shortLabel":"Solitary kidney"},{"type":"cb","id":"kub_acute_3","label":"Temperature above 38 degrees","shortLabel":"Temp >38°C"},{"type":"cb","id":"kub_acute_4","label":"Peritonitis / signs of sepsis","shortLabel":"Peritonitis / sepsis"},{"type":"cb","id":"kub_acute_5","label":"Known bilateral ureteric stones","shortLabel":"Bilateral ureteric stones"}]},{"title":"Acute — within 48 hours (no red flags)","items":[{"type":"cb","id":"kub_48_1","label":"First presentation of suspected renal colic with no red flags","shortLabel":"First presentation renal colic, no red flags"},{"type":"cb","id":"kub_48_2","label":"Secondary care clinician, PCRL or radiologist advises referral for same or next day CT KUB","shortLabel":"Advised by secondary care / PCRL / radiologist (same/next day)"}]},{"title":"S2 — Specified date, within 2 weeks of target date","items":[{"type":"cb","id":"kub_s2_1","label":"Follow-up per Renal Colic and Urinary Tract Stones HealthPathway, if calculus not visible on KUB X-ray","shortLabel":"Follow-up — calculus not visible on KUB X-ray"},{"type":"cb","id":"kub_s2_2","label":"Secondary care clinician, PCRL or radiologist advises referral for specified-date CT KUB","shortLabel":"Advised by secondary care / PCRL / radiologist (specified date)"}]}],"outOfCriteriaNote":"Not routinely funded for: recurrent renal colic in patients aged <50 with typical presentation, no red flags, and confirmed stone on CT KUB in last 5 years; surveillance of asymptomatic patients with previous nephrolithiasis; children younger than 16 years.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=20717.htm","guidanceNarrative":"For pregnant patients or females younger than 35 without haematuria, fever, history of stones, or solitary kidney, request renal tract ultrasound instead of CT KUB. Consider arranging additional plain X-ray KUB at the same time — confirming the stone is visible on x-ray at presentation enables 4-week follow-up with plain x-ray if required. Avoid requesting repeated CT KUB imaging in otherwise healthy patients aged younger than 50 years with a known history of kidney stones; if typical presentation without red flags, repeat imaging is not usually required.","alternativeManagement":"Females aged younger than 35 years with renal colic — arrange renal ultrasound rather than CT KUB, unless the patient has: haematuria x10, fever, history of stones, or solitary kidney. Pregnant women with renal colic — arrange renal ultrasound.","notFundedDetail":"Recurrent renal colic — imaging is not required if pain is well controlled and the patient is aged younger than 50 years, presenting with typical renal colic, has no red flags, and has had a confirmed stone on CT KUB during the last 5 years. Surveillance of asymptomatic patients with previous nephrolithiasis. Children younger than 16 years — consider requesting paediatric assessment.","footnotes":"*1 Renal colic red flags: fever/rigors; single kidney; known significant renal impairment; suspected bilateral obstructing stones; pregnancy."},{"id":"ct_sinus","label":"Sinus","inlineGuidance":"CRS symptoms are poor predictors of sinus disease on imaging (specificity ~30%). Early CT sinus is more cost-efficient than presuming CRS on symptoms alone. All prerequisites below must be met.","groups":[{"title":"P3 — Non-deferrable, within 6 weeks","items":[{"type":"cb","id":"sin_p3_1","label":"Suspected chronic rhinosinusitis AND moderate to severe symptoms persist despite daily nasal saline irrigation AND intranasal corticosteroids (INCS) trialled for at least 12 weeks with satisfactory patient technique and compliance AND patient has not previously had a CT sinus scan","shortLabel":"Chronic rhinosinusitis — failed 12-week INCS trial, no prior CT sinus","mandatory":true},{"type":"cb","id":"sin_p3_2","label":"ORL specialist, PCRL or radiologist advises referral for non-urgent CT sinus","shortLabel":"Advised by ORL / PCRL / radiologist (non-urgent)"}]}],"outOfCriteriaItems":[{"type":"cb","id":"sin_ooc_1","label":"I have confirmed the patient has tried nasal saline irrigation and INCS for at least 12 weeks"},{"type":"cb","id":"sin_ooc_2","label":"I have confirmed the patient has not previously had a CT sinus scan"}],"outOfCriteriaNote":"Not routinely funded for follow-up scans to assess treatment response. Red flags for sino-nasal malignancy (unilateral nasal obstruction with haemo-serous discharge; Horner syndrome/diplopia/cranial neuropathies; paraesthesia of cheek/gingiva/palate) — refer urgently to ORL.","outOfCriteriaStyle":"alert","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=29072.htm","guidanceNarrative":"Chronic Rhinosinusitis (CRS) symptoms and its clinical presentation to primary care have been shown to be poor predictors of sinus disease on imaging with a low specificity of approximately 30%. Early CT sinus to confirm the diagnosis has been shown to be both beneficial to the patient and more cost-efficient than presuming a diagnosis of CRS based on symptoms alone. Rhinosinusitis is one of the most common reasons for adult outpatient antibiotic prescriptions, though there is little clinical evidence to support this practice especially for chronic rhinosinusitis. These national CT sinus referral pre-requisites are necessarily based on a compromise between specialist advice and Health New Zealand funded resource availability. Refer for acute assessment without imaging if rhinosinusitis symptoms are associated with any red flags for intracranial or orbital pathology including: severe frontal headache, severe systemic symptoms, altered visual acuity or diplopia.","alternativeManagement":"Rhinosinusitis symptoms associated with any of the following red flags for sino-nasal malignancy — refer for urgent ORL assessment: unilateral nasal obstruction with haemo-serous discharge; recent onset of Horner syndrome, diplopia, or cranial neuropathies (particularly sensory change); paraesthesia in the skin of cheek, maxillary gingiva, or hard palate. Allergic rhinitis causing nasal obstruction or discharge — see local Rhino-Sinusitis HealthPathway.","notFundedDetail":"Follow-up scans to assess treatment response.","footnotes":""}],"safetyQuestions":[{"type":"radio","id":"ct_metformin","label":"Is the patient on metformin?","options":["Yes","No","Unknown"]},{"type":"radio","id":"ct_contrast_allergy","label":"Known iodinated contrast allergy?","options":["Yes","No","Unknown"]}]},{"id":"us","title":"Ultrasound","modality":"Ultrasound","type":"multisite","active":true,"guidance":"Select the anatomical site being requested, then complete the clinical indicators. Note: maternity and gynaecological ultrasound is outside CRR scope — refer via separate pathway.","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=20716.htm","sites":[{"id":"us_abdomen","label":"Abdomen","inlineGuidance":"Opportunistic liver function testing is not indicated for asymptomatic people without risk factors.","groups":[{"title":"Refer for acute assessment — without initial imaging","items":[{"type":"cb","id":"usa_emerg_1","label":"Suspected acute cholecystitis or cholangitis (intractable biliary colic not relieved by simple analgesia, especially with fever or persistent vomiting)","shortLabel":"Suspected acute cholecystitis/cholangitis"},{"type":"cb","id":"usa_emerg_2","label":"Acute abdomen, including possible appendicitis","shortLabel":"Acute abdomen / possible appendicitis"},{"type":"cb","id":"usa_emerg_3","label":"Suspicion of ruptured abdominal aortic aneurysm","shortLabel":"Suspected ruptured AAA"},{"type":"cb","id":"usa_emerg_4","label":"Suspected testicular torsion","shortLabel":"Suspected testicular torsion"}]},{"title":"Acute — within 48 hours","items":[{"type":"cb","id":"usa_48_1","label":"Painful jaundice","shortLabel":"Painful jaundice"},{"type":"cb","id":"usa_48_2","label":"Painless jaundice without obvious cause (consider discussing with secondary care or PCRL — CT may be more appropriate)","shortLabel":"Painless jaundice — consider PCRL advice re CT"},{"type":"cb","id":"usa_48_3","label":"Secondary care clinician, PCRL or radiologist advises referral for same or next day ultrasound scan","shortLabel":"Advised by secondary care / PCRL / radiologist (same/next day)"}]},{"title":"P2 — Urgent, within 2 weeks","items":[{"type":"cb","id":"usa_p2_1","label":"Obstructive picture on liver function testing: elevated ALP more than 2x ULN together with elevated GGT +/- raised bilirubin +/- raised ALT","shortLabel":"Obstructive LFTs: ALP >2x ULN + elevated GGT"},{"type":"cb","id":"usa_p2_2","label":"Suspected acute cholecystitis/biliary colic with raised ALP and GGT +/- bilirubin AND symptoms settle with analgesia AND biliary tree has not previously been imaged","shortLabel":"Biliary colic with raised ALP/GGT — biliary tree not previously imaged"},{"type":"cb","id":"usa_p2_3","label":"Secondary care clinician, PCRL or radiologist advises referral for urgent ultrasound scan","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)"}]},{"title":"P3 — Non-deferrable, within 6 weeks","items":[{"type":"cb","id":"usa_p3_1","label":"Recurrent right upper quadrant or epigastric non-dyspepsia pain without previous imaging","shortLabel":"Recurrent RUQ/epigastric pain, no prior imaging"},{"type":"cb","id":"usa_p3_2","label":"Suspected resolved acute biliary colic or cholecystitis, without previous imaging showing gallstones, AND patient is a potential candidate for and would accept cholecystectomy","shortLabel":"Resolved biliary colic/cholecystitis, no prior imaging, surgical candidate"},{"type":"cb","id":"usa_p3_3","label":"ALP greater than 2x ULN AND elevated GGT confirming liver origin AND elevated ALP persists on re-testing after 3 months","shortLabel":"ALP >2x ULN + elevated GGT, persists after 3 months"},{"type":"cb","id":"usa_p3_4","label":"ALT greater than 120 IU/L AND conservative methods unsuccessful in patients with high risk factors (diabetes, obesity, hepatotoxic medications) AND no clinical features of concern","shortLabel":"ALT >120 IU/L, conservative measures failed, high risk factors"},{"type":"cb","id":"usa_p3_5","label":"Isolated raised GGT more than 5x ULN and persists on re-testing after 3 months","shortLabel":"Isolated GGT >5x ULN, persists after 3 months"},{"type":"cb","id":"usa_p3_6","label":"Asymptomatic newly suspected abdominal aortic aneurysm (e.g. on clinical examination or other imaging)","shortLabel":"Newly suspected AAA — asymptomatic"},{"type":"cb","id":"usa_p3_7","label":"Non-pulsatile abdominal mass and suspected enlarged liver on examination","shortLabel":"Non-pulsatile abdominal mass / suspected hepatomegaly"},{"type":"cb","id":"usa_p3_8","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent ultrasound scan","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)"}]},{"title":"S3 — Specified date, within 6 weeks of target date","items":[{"type":"cb","id":"usa_s3_1","label":"HCC surveillance using liver ultrasound as initially recommended by a gastroenterologist or other secondary care specialist, or as recommended by an agreed local pathway","shortLabel":"HCC surveillance — specialist recommended"},{"type":"cb","id":"usa_s3_2","label":"Surveillance of known abdominal aortic aneurysm according to local HealthPathway or NZ Vascular Society guidelines (2015) or secondary care specialist advice","shortLabel":"Known AAA surveillance per HealthPathway or NZ Vascular Society guidelines"},{"type":"cb","id":"usa_s3_3","label":"Follow-up of incidental finding on imaging (including gallbladder polyps) according to Incidental Findings on Imaging HealthPathway or radiology report/PCRL advice","shortLabel":"Incidental finding follow-up per HealthPathway or radiology report"}]}],"outOfCriteriaNote":"Not routinely funded for: hernia in adults; infective hepatitis; follow-up of previously diagnosed gallstones in asymptomatic patients; isolated bloating; follow-up of simple renal or hepatic cysts; screening for AAA or fatty liver.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=15607.htm","guidanceNarrative":"Opportunistic liver function testing is not indicated for asymptomatic people without risk factors. 2.5% of the normal population will fall outside the upper limit of the reference range as part of normal statistical distribution, and test results may fluctuate as a physiological response. Elevated liver enzyme levels are estimated to occur in up to 9% of asymptomatic people. Abnormal liver blood test results should only be interpreted after review of previous results, past medical history and current medical condition. Liver disease is rare among people with abnormal LFT results in primary care. On the other hand, severe liver disease may be present with little or no liver function abnormality, so the level or duration of elevation should not determine the significance, but the result should be viewed within the context of trend, past medical and drug history and current symptoms. For practical purposes, marker abnormalities are usually considered 'borderline' if they are less than 2 times the ULN and 'mild' if they are 2-5 times the ULN. If hepatocellular injury is suspected and the patient does not have concerning symptoms/features, ultrasound is a second-tier investigation after investigating the most likely causes. Obesity and raised ALT provide strong evidence for a presumptive diagnosis of fatty liver — ultrasound is not always necessary. Ultrasound imaging is a first-line investigation if cholestasis is suspected based on LFT results.","alternativeManagement":"Upper abdominal non-pulsatile mass not consistent with hepatomegaly — discuss with PCRL or relevant secondary care specialist as referral for CT abdomen may be more appropriate. Unexplained weight loss, persistent fatigue, vague abdominal pain and suspicion of underlying malignancy — see local CT Chest, Abdomen and Pelvis HealthPathway.","notFundedDetail":"Hernia in adults. Infective hepatitis. Follow-up imaging of previously diagnosed gallstones in asymptomatic patients. Isolated bloating (however with additional clinical symptoms such as loss of appetite, weight loss, abdominal pain or abnormal vaginal bleeding, USS or CT may be warranted). Follow-up imaging of simple renal or hepatic cysts. Screening for aortic aneurysm or fatty liver.","footnotes":""},{"id":"us_carotid","label":"Carotid","inlineGuidance":"All patients with suspected TIA who after specialist assessment are candidates for carotid endarterectomy should have urgent carotid imaging. Choice of modality (US, CTA, or MRA) based on local expertise. Carotid imaging preferably completed at same visit as brain imaging.","groups":[{"title":"Refer for acute assessment — without initial imaging","items":[{"type":"cb","id":"usc_emerg_1","label":"Suspected TIA with any of: atypical symptoms; currently on anticoagulants; new or known atrial fibrillation","shortLabel":"Suspected TIA with atypical symptoms, anticoagulants, or AF"}]},{"title":"Acute — within 48 hours","items":[{"type":"cb","id":"usc_48_1","label":"Suspected TIA with typical symptoms, not in AF, not on anticoagulants AND episode within last 2 weeks AND symptoms consistent with anterior circulation TIA (language dysfunction and/or limb weakness) AND patient is a candidate for carotid endarterectomy AND acute stroke specialist not available AND carotid imaging recommended by HNZ neurologist/stroke specialist OR BPAC TIA tool indicates carotid imaging appropriate","shortLabel":"Suspected anterior circulation TIA — meets carotid imaging criteria"}]}],"outOfCriteriaNote":"Not funded for: asymptomatic bruits; carotid artery calcification on X-ray; screening tests. High risk TIAs (atypical symptoms, AF, anticoagulants) — request acute on-call stroke specialist assessment.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=29069.htm","guidanceNarrative":"Recommended best practice is for all patients with suspected TIA who after specialist assessment are considered as candidates for carotid endarterectomy to have urgent carotid imaging. The choice of modality (ultrasound, CTA, or MRA) should be based on local expertise and availability. Carotid imaging is preferably completed at the same visit as brain imaging.","alternativeManagement":"High-risk TIAs (atypical symptoms, patient in atrial fibrillation and on anticoagulants) — request acute on-call stroke specialist assessment. Suspected TIA over 7 days ago — see local TIA HealthPathway.","notFundedDetail":"Carotid endarterectomy is not publicly funded for asymptomatic stenosis so carotid imaging is not funded for: asymptomatic bruits; carotid artery calcification on X-ray; screening tests.","footnotes":""},{"id":"us_dvt","label":"DVT","inlineGuidance":"Use Well's score to stratify clinical suspicion. D-dimer should be used in conjunction with Well's score.","groups":[{"title":"Acute — within 24 hours","items":[{"type":"cb","id":"usd_24_1","label":"Superficial venous thrombosis affecting the proximal long saphenous vein in the thigh","shortLabel":"SVT — proximal long saphenous vein in thigh"},{"type":"cb","id":"usd_24_2","label":"Clinically suspected upper limb DVT","shortLabel":"Suspected upper limb DVT"},{"type":"cb","id":"usd_24_3","label":"Same day DVT US recommended by HNZ Haematology service or other secondary care specialist","shortLabel":"Same day US recommended by haematology/secondary care"}]},{"title":"Acute — within 48 hours","items":[{"type":"cb","id":"usd_48_1","label":"Clinically suspected lower limb DVT AND Well's score of 2 or greater","shortLabel":"Suspected lower limb DVT — Well's score 2+"},{"type":"cb","id":"usd_48_2","label":"Clinically suspected lower limb DVT AND Well's score less than 2 AND positive D-dimer","shortLabel":"Suspected lower limb DVT — Well's <2 with positive D-dimer"}]},{"title":"S1 — Specified date, within 1 week of target date","items":[{"type":"cb","id":"usd_s1_1","label":"No DVT seen on initial ultrasound but clinical suspicion remains high AND D-dimer positive AND high likelihood on Well's score (2 or higher) — follow-up scan 5-8 days after initial scan","shortLabel":"High clinical suspicion, negative initial US — follow-up at 5-8 days"},{"type":"cb","id":"usd_s1_2","label":"Check for proximal clot extension in a calf DVT not being treated with anticoagulation, between 5-8 days after initial scan","shortLabel":"Calf DVT — check for proximal extension at 5-8 days"}]},{"title":"S2 — Specified date, within 2 weeks of target date","items":[{"type":"cb","id":"usd_s2_1","label":"Follow-up scan after anticoagulation therapy as recommended by secondary care specialist","shortLabel":"Follow-up post-anticoagulation therapy — secondary care recommended"}]}],"outOfCriteriaNote":"Not routinely funded for: routine follow-up scanning to confirm clot resolution; superficial venous thrombosis unless affecting the proximal long saphenous vein in the thigh.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=32358.htm","guidanceNarrative":"Use Well's score to stratify clinical suspicion. D-dimer should be used in conjunction with Well's score.","alternativeManagement":"Children aged younger than 15 years — see local DVT HealthPathway. Pregnant women — see local DVT HealthPathway.","notFundedDetail":"Routine follow-up scanning to confirm clot resolution — this does not typically assist with decisions on duration of anticoagulation. Superficial venous thrombosis unless affecting the proximal long saphenous vein in the thigh.","footnotes":""},{"id":"us_msk","label":"Musculoskeletal (incl. Shoulder)","inlineGuidance":"No routine direct access to publicly funded (non-ACC) musculoskeletal ultrasound. Ultrasound findings alone do not typically change management. Initial management should always include a 2-3 month trial of physiotherapy. Radiology is not a prerequisite for a trial of steroid injection when red flags are excluded.","groups":[{"title":"P3-P4 — within 6 to 12 weeks","items":[{"type":"cb","id":"usmsk_1","label":"Secondary care clinician or Primary Care Radiology Liaison or radiologist advises referral for non-urgent shoulder or another musculoskeletal ultrasound","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent MSK)"}]}],"outOfCriteriaNote":"Not routinely funded for: Achilles or other tendon pain; plantar fasciitis; forefoot pain (suspected Morton's neuroma); tennis elbow; golfer's elbow; tenosynovitis; trochanteric pain (gluteal tendinopathy). If inadequate response to physiotherapy seek management advice from secondary care.","outOfCriteriaStyle":"alert","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=15606.htm","guidanceNarrative":"70% of shoulder pain in general practice can be attributed to the rotator cuff complex. Rotator cuff tendonitis is the most common underlying pathology and most likely diagnosis in the absence of demonstrated weakness on examination. Most presentations with shoulder pain and suspected rotator cuff pathologies including smaller tears will resolve with conservative management and do not require imaging. Initial management should always include a 2-3 month trial of physiotherapy. Radiology is not a pre-requisite for a trial of steroid injection when a full clinical assessment has been undertaken and red flags excluded. There is no routine direct access to publicly funded (non-ACC) shoulder or other musculoskeletal ultrasound. Ultrasound findings alone do not typically change the management approach. If there is inadequate response to physiotherapy (+/- cortisone injection), management advice may be sought from secondary care and imaging requested on their recommendation or a case for imaging made to the PCRL.","alternativeManagement":"Shoulder pain with reduced passive range of motion and frozen shoulder is suspected — see local Shoulder Pain HealthPathway. Suspected olecranon or other bursitis — see local Shoulder Pain HealthPathway.","notFundedDetail":"Achilles or other tendon pain. Plantar fasciitis. Forefoot pain — suspected Morton's neuroma. Tennis elbow. Golfer's elbow. Tenosynovitis. Trochanteric pain (gluteal tendinopathy).","footnotes":"*1 Red flags: fever/systemically unwell; persistent night pain waking from sleep; pain at rest; restricted passive movement; inflammation/swelling."},{"id":"us_neck_thyroid","label":"Neck / Thyroid","inlineGuidance":"For palpable masses, FNA (preferably US-guided) provides better diagnostic accuracy than US alone and is the preferred initial diagnostic approach. Ultrasound reveals nodules in up to 65% of adults — the large majority are benign.","groups":[{"title":"P2 — Urgent, within 2 weeks","items":[{"type":"cb","id":"usnt_p2_1","label":"Palpable thyroid nodule with suspicious features (painless rapid growth over 2-3 months, unexplained voice changes, youth/child, family history of MEN syndrome, enlarged neck lymph nodes) AND local pathway or secondary care specialist recommends referral for ultrasound","shortLabel":"Palpable thyroid nodule with suspicious features — specialist recommends US"},{"type":"cb","id":"usnt_p2_2","label":"FDG-avid incidental thyroid nodule on PET-CT scan of any size","shortLabel":"FDG-avid incidental thyroid nodule on PET-CT"},{"type":"cb","id":"usnt_p2_3","label":"Undifferentiated, solitary, non-pulsatile neck mass: present >3 weeks despite antibiotics AND larger than 1.5cm in diameter AND no obvious cause","shortLabel":"Solitary neck mass >1.5cm, present >3 wks despite antibiotics, no cause"},{"type":"cb","id":"usnt_p2_4","label":"Urgent Ultrasound Neck or Thyroid recommended by a secondary care clinician, PCRL, or radiologist","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)"}]},{"title":"P3 — Non-deferrable, within 6 weeks","items":[{"type":"cb","id":"usnt_p3_1","label":"Palpable thyroid nodule, no suspicious features, euthyroid — initial imaging","shortLabel":"Palpable thyroid nodule, no suspicious features, euthyroid"},{"type":"cb","id":"usnt_p3_2","label":"Non-urgent Ultrasound Neck or Thyroid recommended by a secondary care clinician, PCRL, or radiologist","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)"}]},{"title":"P4 — Deferrable, within 6-12 weeks","items":[{"type":"cb","id":"usnt_p4_1","label":"Solitary impalpable incidental thyroid nodule (ITN) on CT or MR imaging, TSH normal or elevated AND nodule >10mm in patient aged <35 years OR >15mm in patient aged 35+ years OR any size with adverse features on CT/MR imaging","shortLabel":"Incidental thyroid nodule on CT/MR — meets size/age threshold"},{"type":"cb","id":"usnt_p4_2","label":"Multiple incidental thyroid nodules on CT or MR imaging, TSH normal or elevated, AND one or more nodules 20mm or more in longest diameter","shortLabel":"Multiple incidental thyroid nodules on CT/MR — one or more 20mm+"}]},{"title":"S2 — Specified date, within 2 weeks of target date","items":[{"type":"cb","id":"usnt_s2_1","label":"Non-urgent deferrable Ultrasound Neck or Thyroid recommended by a secondary care specialist, PCRL, or radiologist","shortLabel":"Deferrable US recommended by secondary care / PCRL / radiologist"},{"type":"cb","id":"usnt_s2_2","label":"Follow-up ultrasound recommended by a secondary care specialist or radiologist for a high-risk thyroid nodule previously identified on ultrasound, CT or MRI","shortLabel":"Follow-up for high-risk thyroid nodule — specialist recommended"}]}],"outOfCriteriaNote":"Not routinely funded for: ITN with co-morbidities and limited life expectancy; solitary ITN on CT/MR <10mm without adverse features; multiple nodules all <20mm without adverse features. Incidental thyroid nodule with reduced TSH — refer for nuclear medicine scan.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=20738.htm","guidanceNarrative":"Ultrasound is of limited value in the diagnostic work up of thyroid and neck masses. It can help confirm the origin of the mass and provide some characterisation but for palpable masses, fine needle aspiration (FNA — preferably ultrasound-guided) provides better diagnostic accuracy than ultrasound alone and is the preferred initial diagnostic approach where available. Ultrasound evaluation of the thyroid reveals nodules in up to 65% of adults depending on age and gender. The large majority are benign nodules. Thyroid cancer occurs in 7-15% of thyroid nodules. 85% of these are papillary cancers which don't cause any ill-health or affect longevity and there is therefore no benefit in finding these cancers. Approximately 5% of thyroid nodules will harbour an important thyroid cancer (one likely to cause ill health in the future). The challenge is to identify the few clinically important cancers (medullary, anaplastic) but avoid using a lot of scarce resource working up all incidentally discovered nodules.","alternativeManagement":"Multiple neck masses or suspected metastatic lymphadenopathy — investigate and refer as per the Neck Lumps in Adults HealthPathway. Incidental thyroid nodule on CT scan or MRI and TSH reduced — refer for nuclear medicine Tc-99m pertechnetate scan. Goitre or diffuse thyroid swelling with severe obstructive symptoms (stridor, wheezing at rest) — refer for acute secondary care assessment as per local HealthPathway. Goitre or thyroid mass with mild to moderate obstructive symptoms — see local Goitre HealthPathway. Thyrotoxicosis/Hyperthyroidism — see local Hyperthyroidism HealthPathway. Hypothyroidism — see local Hypothyroid HealthPathway. If presenting symptoms do not meet criteria but ultrasound may be indicated — seek advice from PCRL or relevant secondary care specialist.","notFundedDetail":"ITN in patient with co-morbidities and limited life expectancy — imaging work up not recommended. Solitary ITN on CT or MR imaging smaller than 10mm in diameter and without adverse imaging or clinically suspicious features. Multiple nodules all smaller than 20mm in diameter and without any adverse features on CT or MR imaging and likely to be benign.","footnotes":""},{"id":"us_pelvis","label":"Pelvis","inlineGuidance":"In acute pelvic pain, ultrasound as a rule-out investigation is limited — acuity of presentation should determine referral to hospital vs community management. PID is commonly associated with a normal ultrasound and is typically a clinical diagnosis. Maori and Pacific peoples are disproportionately affected by endometrial cancer — lower threshold for investigation.","groups":[{"title":"Refer for acute assessment — without initial imaging","items":[{"type":"cb","id":"usp_emerg_1","label":"Clinically unstable patients with suspected gynaecologic or pelvic cause","shortLabel":"Clinically unstable — suspected gynaecologic cause"}]},{"title":"Acute — within 24 hours","items":[{"type":"cb","id":"usp_24_1","label":"Sudden onset severe pelvic pain, clinically stable — suspected ovarian torsion or ovarian cyst accident (rupture or bleed)","shortLabel":"Sudden severe pelvic pain — suspected ovarian torsion or cyst accident"},{"type":"cb","id":"usp_24_2","label":"Possible endometritis from RPOC — persistent pelvic pain and tenderness +/- low grade fever +/- bleeding, outside 2-week post-miscarriage maternity-funded scan window","shortLabel":"Possible endometritis/RPOC — outside maternity scan window"},{"type":"cb","id":"usp_24_3","label":"IUCD strings missing or IUCD breaks on removal with only fragment removed AND symptoms suggestive of possible perforation (cramping pain, discharge, unexplained bleeding)","shortLabel":"IUCD missing/broken with symptoms of possible perforation"}]},{"title":"Acute — within 48 hours","items":[{"type":"cb","id":"usp_48_1","label":"Suspected ongoing pregnancy >14 days post abortion AND urine HCG >1000 IU at 14 days OR serial serum bHCG remains high/increased after EMA","shortLabel":"Suspected ongoing pregnancy >14 days post abortion — HCG criteria met"},{"type":"cb","id":"usp_48_2","label":"Secondary care clinician, PCRL or radiologist advises referral for same or next day ultrasound pelvis","shortLabel":"Advised by secondary care / PCRL / radiologist (same/next day)"}]},{"title":"P2 — Urgent, within 2 weeks","items":[{"type":"cb","id":"usp_p2_1","label":"Pelvic mass on examination suspicious of cancer","shortLabel":"Pelvic mass suspicious of cancer on examination"},{"type":"cb","id":"usp_p2_2","label":"Post-menopausal bleeding (vaginal bleeding after >12 months amenorrhoea around expected age of menopause approximately 50 years)","shortLabel":"Post-menopausal bleeding"},{"type":"cb","id":"usp_p2_3","label":"Persistent post-menopausal bleeding at any age while on continuous combined MHT and it has been >6 months since starting therapy","shortLabel":"Persistent PMB on continuous combined MHT >6 months"},{"type":"cb","id":"usp_p2_4","label":"No palpable pelvic mass but new abdominal or pelvic symptoms on a persistent or frequent basis (>12 times/month) AND Ca-125 35 units/mL or greater irrespective of menopause status","shortLabel":"Persistent pelvic/abdominal symptoms >12x/month + Ca-125 35+"},{"type":"cb","id":"usp_p2_5","label":"AUB with non-uterine causes excluded AND woman of any age with AUB AND at least two risk factors for EH/EC OR pelvic mass suspected on examination with no prior imaging","shortLabel":"AUB with 2+ EH/EC risk factors, or suspected pelvic mass, no prior imaging"},{"type":"cb","id":"usp_p2_6","label":"Atypical (AG2) endometrial cells reported on cervical screening cytology in women of any age and menopause status","shortLabel":"AG2 endometrial cells on cervical cytology"},{"type":"cb","id":"usp_p2_7","label":"Secondary care clinician, PCRL or radiologist advises referral for urgent US pelvis","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)"}]},{"title":"P3 — Non-deferrable, within 6 weeks","items":[{"type":"cb","id":"usp_p3_1","label":"Women aged 45 years or older with AUB and non-uterine causes excluded","shortLabel":"AUB, non-uterine causes excluded, aged 45+"},{"type":"cb","id":"usp_p3_2","label":"Women aged younger than 45 years with AUB AND one or more risk factors for EH/EC","shortLabel":"AUB aged <45 with 1+ EH/EC risk factor"},{"type":"cb","id":"usp_p3_3","label":"Women aged younger than 45 years with AUB who have not responded to first-line treatment trialled for at least 3 months","shortLabel":"AUB aged <45 — failed first-line treatment 3+ months"},{"type":"cb","id":"usp_p3_4","label":"Perimenopausal woman on combined cyclical MHT with ongoing irregular bleeding or bleeding outside progestogen withdrawal, despite trial of increased progestogen, and it has been >6 months since starting MHT","shortLabel":"Perimenopausal — irregular bleeding on cyclical MHT >6 months"},{"type":"cb","id":"usp_p3_5","label":"Benign-appearing endometrial cells on cervical smear AND at least one of: post-menopausal; symptomatic; suspected mass on exam; 1+ EH/EC risk factor","shortLabel":"Benign endometrial cells on smear + post-menopausal or symptomatic or risk factor"},{"type":"cb","id":"usp_p3_6","label":"Suspected ovarian cyst (unilateral pelvic pain >4 weeks and/or unilateral tenderness) or other pelvic mass and low/uncertain suspicion of cancer","shortLabel":"Suspected ovarian cyst or pelvic mass — low cancer suspicion"},{"type":"cb","id":"usp_p3_7","label":"Pelvic pain >6 weeks, unrelated to menstrual cycle, with PID excluded as cause per local PID HealthPathway","shortLabel":"Chronic pelvic pain >6 weeks — PID excluded"},{"type":"cb","id":"usp_p3_8","label":"Primary amenorrhoea (absence of menarche by age 16 years, or age 14 years if absent secondary sexual characteristics)","shortLabel":"Primary amenorrhoea"},{"type":"cb","id":"usp_p3_9","label":"Secondary dysmenorrhoea — new onset, debilitating pain persists despite 3-month trial of medical management","shortLabel":"Secondary dysmenorrhoea — failed 3-month medical management"},{"type":"cb","id":"usp_p3_10","label":"Secondary care clinician, PCRL or radiologist advises referral for routine ultrasound pelvis","shortLabel":"Advised by secondary care / PCRL / radiologist (routine)"}]},{"title":"P4 — Deferrable, within 6-12 weeks","items":[{"type":"cb","id":"usp_p4_1","label":"PCOS suspected but only one of three Rotterdam diagnostic criteria fulfilled (hyperandrogenism, polycystic ovaries, irregular menses)","shortLabel":"Suspected PCOS — only 1 of 3 Rotterdam criteria met"},{"type":"cb","id":"usp_p4_2","label":"Known fibroid >5cm which becomes symptomatic (pelvic pressure, back pain, dyspareunia, urination difficulties) after commencing MHT","shortLabel":"Known fibroid >5cm — new symptoms after starting MHT"},{"type":"cb","id":"usp_p4_3","label":"Secondary care clinician, PCRL or radiologist advises referral for deferrable non-urgent ultrasound pelvis","shortLabel":"Advised by secondary care / PCRL / radiologist (deferrable)"}]}],"outOfCriteriaNote":"Not routinely funded for: routine follow-up of known fibroids; subfertility; follow-up of asymptomatic simple ovarian cyst (O-RADS 2) <3cm post-menopausal or <5cm pre-menopausal; screening for ovarian cancer family history (refer to secondary care). Women aged <45 with AUB, no risk factors, no abnormality on exam, and first-line treatment not yet trialled.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=15608.htm","guidanceNarrative":"In the acute pelvic pain presentation, the use of ultrasound as a 'rule out' investigation is limited — the acuity of the presentation (and the expected management required) should remain the determining factor in referral to hospital vs community management. If the patient requires hospital assessment regardless of the ultrasound result, a community-provided acute demand ultrasound is typically not warranted unless specifically advised by a secondary care specialist. In suspected ovarian/adnexal torsion, ultrasound has good specificity (85-90%) but lower sensitivity (75-80%). Pelvic Inflammatory Disease (PID) remains the most common cause of acute pelvic pain. It is commonly associated with a normal ultrasound and is typically considered a clinical diagnosis. Māori and Pacific Peoples are disproportionately affected by endometrial cancer (EC) and endometrial hyperplasia (EH). Investigations including transvaginal ultrasound and/or aspiration endometrial sampling should be considered at or soon after initial presentation for all Māori and Pacific people presenting with abnormal uterine bleeding (AUB).","alternativeManagement":"Suspected retained products of conception (RPOC) with persistent or heavy bleeding after abortion or miscarriage — see local Abortion HealthPathway or Miscarriage HealthPathway. Suspected endometriosis in the absence of a clinically palpable mass — see local Endometriosis HealthPathway. Primary dysmenorrhoea in the absence of a clinically palpable mass — see local Dysmenorrhoea HealthPathway. Pelvic inflammatory disease in the absence of a clinically palpable mass — see local PID HealthPathway. Cervical polyps — referral to secondary care rather than ultrasound is recommended for women with polyps which prove difficult to remove. Secondary amenorrhoea — pelvic USS is not normally helpful unless a pelvic mass is present or the patient has significantly raised androgens.","notFundedDetail":"Routine follow-up of known fibroids. Subfertility. Follow-up of asymptomatic simple ovarian cyst (O-RADS 2) less than 3cm in diameter in post-menopausal woman. Follow-up of asymptomatic simple ovarian cyst (O-RADS 2) less than 5cm in diameter in premenopausal woman. Follow-up of asymptomatic non-simple ovarian cyst less than 3cm diameter in premenopausal woman. Follow-up of typical-appearing haemorrhagic cyst up to 5cm diameter in pre-menopausal woman. Benign-appearing endometrial cells on smear in asymptomatic pre-menopausal women with no abnormality on exam and without any risk factors for EH/EC. Erratic unscheduled bleeding in the first 3 to 6 months after starting MHT. Screening ultrasound for family history of ovarian cancer (refer to secondary care instead). Women aged less than 45 years with AUB and no risk factors for EH/EC, no abnormality on examination, and where first-line treatment has not been trialled.","footnotes":"*1 Patients with suspected endometritis: suspected infection with ongoing pelvic pain post-partum/miscarriage/abortion, uterine tenderness, with or without fever and/or bleeding but systemically stable. If systemically unstable and/or severe persistent pelvic pain refer for acute assessment without requesting imaging.\n*2 Presentations warranting consideration of ovarian cancer in absence of palpable mass — new abdominal or pelvic symptoms on persistent or frequent basis (particularly more than 12 times per month): persistent abdominal distension or bloating; early satiety or loss of appetite; pelvic or abdominal pain without a known cause; increased urinary urgency or frequency; irritable bowel symptoms especially if new onset and aged over 50; unexplained weight loss or fatigue.\n*3 Abnormal Uterine Bleeding (AUB): bleeding from the uterus that is abnormal in volume, regularity, frequency or duration in the absence of pregnancy (excluding postmenopausal bleeding). May be acute (urgent referral) or chronic (6 months or more). Includes heavy menstrual bleeding, irregular cycles (10+ days variation), prolonged menstrual bleeding (>8 days), secondary amenorrhoea, infrequent cycles (<every 38 days), frequent cycles (>every 24 days), intermenstrual bleeding, post-coital bleeding, and unscheduled bleeding on hormonal medication.\n*4 Non-uterine causes of bleeding: vulvovaginal atrophy/atrophic vaginitis; vulval dermatoses; STIs including chlamydia; malignancy of cervix/vagina/vulva; cervical ectropion; urethral causes.\n*5 Risk factors for EH/EC: BMI greater than 30; diabetes mellitus (Types I and II); Pacific and Māori ethnicity; PCOS and/or chronic anovulation; unopposed oestrogen therapy; nulliparity and older than 35; early menarche (less than 10 years old); family history of endometrial, ovarian, breast or bowel cancer; oestrogen-secreting tumour."},{"id":"us_renal","label":"Renal","inlineGuidance":"Suspected renal colic in a non-pregnant person: see CT KUB pathway. Macroscopic haematuria aged 40-85: prefer CT IVU.","groups":[{"title":"Acute — within 24 hours","items":[{"type":"cb","id":"usr_24_1","label":"Renal colic if pregnant or female younger than 35 with uncomplicated presentation (CT KUB/radiation not warranted) AND no history of stones, no solitary kidney, no haematuria/fever","shortLabel":"Renal colic — pregnant or female <35, no CT KUB indication"},{"type":"cb","id":"usr_24_2","label":"Pyelonephritis with fever >38 degrees, pyuria on microscopy, loin pain/tenderness AND not responding to antibiotics after 72 hours OR flank pain not improving within 24hr IV / 48hr oral antibiotics","shortLabel":"Pyelonephritis — not responding to antibiotics"}]},{"title":"Acute — within 48 hours","items":[{"type":"cb","id":"usr_48_1","label":"Acute renal function deterioration — serum creatinine increase >50 micromol/L in 7 days or >25 micromol/L in 2 days (discussion with secondary care/PCRL recommended)","shortLabel":"Acute renal function deterioration — creatinine threshold met"},{"type":"cb","id":"usr_48_2","label":"Suspected chronic urinary retention (new onset incontinence with palpable enlarged bladder)","shortLabel":"Suspected chronic urinary retention — palpable enlarged bladder"},{"type":"cb","id":"usr_48_3","label":"Secondary care clinician, PCRL or radiologist advises referral for acute ultrasound renal","shortLabel":"Advised by secondary care / PCRL / radiologist (acute)"}]},{"title":"P2 — Urgent, within 2 weeks","items":[{"type":"cb","id":"usr_p2_1","label":"Macroscopic haematuria — if younger than 40 years or aged 86 years and older","shortLabel":"Macroscopic haematuria — aged <40 or 86+"},{"type":"cb","id":"usr_p2_2","label":"Macroscopic haematuria — aged 40 to 85 and unable to have intravenous contrast (eGFR <45 or iodine contrast allergy)","shortLabel":"Macroscopic haematuria — aged 40-85, contrast contraindicated"},{"type":"cb","id":"usr_p2_3","label":"Secondary care clinician, PCRL or radiologist advises referral for urgent ultrasound renal","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)"}]},{"title":"P3 — Non-deferrable, within 6 weeks","items":[{"type":"cb","id":"usr_p3_1","label":"Microscopic haematuria — male patient, older than 50 years, current or ex-smoker","shortLabel":"Microscopic haematuria — male >50, current or ex-smoker"},{"type":"cb","id":"usr_p3_2","label":"New diagnosis of CKD and any of: eGFR <30; eGFR <45 with diabetes; eGFR <60 with evidence of progressive disease (eGFR decreased 15+ in previous 12 months); ACR >250","shortLabel":"New CKD — eGFR or ACR threshold met"},{"type":"cb","id":"usr_p3_3","label":"New right-sided or bilateral varicocele","shortLabel":"New right-sided or bilateral varicocele"},{"type":"cb","id":"usr_p3_4","label":"UTI in men — recurrent (2 or more confirmed UTI) OR persistent (persistent bacteriuria with same organism after treatment — consider renal tract stone; refer for KUB X-ray along with renal US)","shortLabel":"UTI in men — recurrent or persistent (refer for KUB X-ray also)"},{"type":"cb","id":"usr_p3_5","label":"UTI in women — recurrent (>3 UTIs in a year or >2 in 6 months despite prophylactic antibiotics) OR persistent bacteriuria with same organism after treatment","shortLabel":"UTI in women — recurrent or persistent"},{"type":"cb","id":"usr_p3_6","label":"Urinary incontinence in men with palpable bladder, or new or deteriorating renal impairment","shortLabel":"Urinary incontinence in men — palpable bladder or deteriorating renal function"},{"type":"cb","id":"usr_p3_7","label":"Recurrent loin pain suggesting renal tract obstruction other than renal stone","shortLabel":"Recurrent loin pain — suspected renal tract obstruction (not stone)"},{"type":"cb","id":"usr_p3_8","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent ultrasound renal","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)"}]},{"title":"P4 — Deferrable, within 6-12 weeks","items":[{"type":"cb","id":"usr_p4_1","label":"Microscopic haematuria — male patient, aged younger than 50 years","shortLabel":"Microscopic haematuria — male <50"},{"type":"cb","id":"usr_p4_2","label":"Microscopic haematuria — female, of any age","shortLabel":"Microscopic haematuria — female, any age"}]}],"outOfCriteriaNote":"Not routinely funded for: recurrent UTIs in women (except as above); investigation of uncomplicated hypertension; bacteriuria in catheterised patients who are not systemically unwell; follow-up of simple renal cysts (Bosniak I and II); screening for ADPKD.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=19858.htm","guidanceNarrative":"Suspected renal colic in a non-pregnant person — see local Renal Colic and Urinary Tract Stones HealthPathway. Macroscopic haematuria in patients who do not have a UTI, if aged 40 to 85 years — refer for CT IVU (Intravenous Urogram) as the preferred investigation.","alternativeManagement":"Incidental finding on ultrasound of a solid lesion more than 1cm diameter with typical ultrasound appearances of an angiomyolipoma — see local CT IVU HealthPathway. Macroscopic haematuria aged 40 to 85 years without UTI — refer for CT IVU. Repeat renal ultrasound for diabetic patients with known diabetic renal complications is not indicated. Acute kidney injury — manage according to Acute Kidney Injury pathway or seek advice from relevant secondary care specialist. Enlarged prostate or elevated PSA — see local Prostate Cancer Diagnosis HealthPathway. Isolated proteinuria — seek nephrology advice. Lower urinary tract symptoms — see local LUTS or Benign Prostatic Hypertrophy HealthPathway.","notFundedDetail":"Recurrent UTIs in women except as documented in criteria. Investigation of uncomplicated hypertension. Bacteriuria in patients with in-dwelling catheters who are not systemically unwell. Follow-up imaging of simple renal cysts (Bosniak I and II). Follow-up of incidental finding on ultrasound of a solid lesion less than 1cm diameter with typical appearances of an angiomyolipoma. Screening scan for Autosomal Dominant Polycystic Kidney Disease (ADPKD). Serial ultrasounds of known polycystic kidneys unless indicated by the radiology report or the patient develops new symptoms meeting criteria.","footnotes":""},{"id":"us_scrotum","label":"Scrotum","inlineGuidance":"New right-sided or bilateral varicocele: arrange renal US to exclude renal cancer with IVC involvement.","groups":[{"title":"Refer for acute assessment — without initial imaging","items":[{"type":"cb","id":"ussc_emerg_1","label":"Suspected testicular torsion","shortLabel":"Suspected testicular torsion"},{"type":"cb","id":"ussc_emerg_2","label":"Strangulated inguinal hernia","shortLabel":"Strangulated inguinal hernia"}]},{"title":"Acute — within 48 hours","items":[{"type":"cb","id":"ussc_48_1","label":"High suspicion of testicular cancer (rapidly growing mass, non-transilluminating, not able to distinguish mass from testis, painless)","shortLabel":"High suspicion of testicular cancer"},{"type":"cb","id":"ussc_48_2","label":"Secondary care clinician, PCRL or radiologist advises referral for acute ultrasound","shortLabel":"Advised by secondary care / PCRL / radiologist (acute)"}]},{"title":"P2 — Urgent, within 2 weeks","items":[{"type":"cb","id":"ussc_p2_1","label":"New hydrocoele in adults (may be secondary to testicular cancer)","shortLabel":"New hydrocoele in adult"},{"type":"cb","id":"ussc_p2_2","label":"Secondary care clinician, PCRL or radiologist advises referral for urgent ultrasound","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)"}]},{"title":"P3 — Non-deferrable, within 6 weeks","items":[{"type":"cb","id":"ussc_p3_1","label":"Scrotal lumps where it is unclear whether the swelling is testicular or extra-testicular, and is non-transilluminating","shortLabel":"Scrotal lump — unclear testicular/extra-testicular, non-transilluminating"},{"type":"cb","id":"ussc_p3_2","label":"Epididymo-orchitis which fails to respond to antibiotic treatment after 7-10 days","shortLabel":"Epididymo-orchitis not responding to antibiotics at 7-10 days"},{"type":"cb","id":"ussc_p3_3","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent ultrasound","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)"}]},{"title":"P4 — Deferrable, within 6-12 weeks","items":[{"type":"cb","id":"ussc_p4_1","label":"Benign scrotal lumps larger than 5cm causing significant impairment in quality of life (affecting employment and/or activities of daily living) and patient is seeking surgery","shortLabel":"Benign scrotal lump >5cm — significant QOL impact, seeking surgery"}]}],"outOfCriteriaNote":"Not routinely funded for: non-s
