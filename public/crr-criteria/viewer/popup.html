olid (transilluminating) scrotal masses <5cm; long-standing hydrocele in adults; routine follow-up of testicular microlithiasis; haematospermia; uncomplicated epididymo-orchitis; orchalgia in absence of abnormality on examination; scrotal pearls.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=29070.htm","guidanceNarrative":"New right-sided or bilateral varicocele — arrange renal ultrasound to exclude renal cancer with inferior vena cava (IVC) involvement.","alternativeManagement":"New right-sided or bilateral varicocele — arrange renal US to exclude renal cancer with IVC involvement.","notFundedDetail":"Non-solid (transilluminating) scrotal masses smaller than 5cm. Long-standing hydrocele in adults. Routine follow-up of testicular microlithiasis. Haematospermia — almost always benign and self-limiting. Uncomplicated epididymo-orchitis. Orchalgia (chronic testicular or scrotal pain in the absence of any abnormality on examination). Scrotal pearls or stones (calcified extra-testicular loose bodies).","footnotes":""},{"id":"us_soft_tissue","label":"Soft Tissue","inlineGuidance":"Soft tissue sarcomas are frequently slow growing and painless — do not be reassured by absence of pain.","groups":[{"title":"Acute — within 48 hours","items":[{"type":"cb","id":"usst_48_1","label":"Localisation of a suspected foreign body for removal (only if not eligible for ACC funding)","shortLabel":"Suspected foreign body — not ACC eligible"}]},{"title":"P2 — Urgent, within 2 weeks","items":[{"type":"cb","id":"usst_p2_1","label":"New lump on trunk or limbs with any of: deep to deep fascia, fixed, hard, irregular of any size; larger than 5cm; changing rapidly; painful; recurring after a previous sarcoma excision","shortLabel":"New trunk/limb lump with suspicious features (deep/hard/large/rapid/recurrent)"},{"type":"cb","id":"usst_p2_2","label":"Secondary care clinician, PCRL or radiologist advises referral for urgent ultrasound","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)"}]},{"title":"P3 — Non-deferrable, within 6 weeks","items":[{"type":"cb","id":"usst_p3_1","label":"New lump on trunk or limbs — superficial, mobile, and larger than 5cm in diameter with uncertain diagnosis OR smaller than 5cm with uncertain whether deep to fascia (fixed)","shortLabel":"New trunk/limb lump — superficial >5cm uncertain, or <5cm uncertain re fascia"},{"type":"cb","id":"usst_p3_2","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent ultrasound","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)"}]}],"outOfCriteriaNote":"Not routinely funded for: soft tissue mass with characteristic appearance of lipomas, ganglions, cysts and no concerning features; suspected abscess. Isolated neck lumps — see US Thyroid/Neck pathway.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=479698.htm","guidanceNarrative":"Soft tissue sarcomas are frequently slow growing and painless — do not be reassured by the absence of pain.","alternativeManagement":"Localisation of a suspected foreign body for removal and eligible for ACC funding — use ACC funding. Isolated neck lumps or enlarged lymph node — see local US Thyroid/Neck HealthPathway. Isolated enlarged axillary lump presumed to be a lymph node — see local Breast Symptoms HealthPathway. Suspected breast abscess — see local Mastitis and Breast Abscess HealthPathway. Breast lumps — see local Breast Symptoms HealthPathway.","notFundedDetail":"Soft tissue mass with characteristic appearance of lipomas, ganglions, cysts and no concerning features. Suspected abscess — see local Soft Tissue Abscesses HealthPathway.","footnotes":""}]},{"id":"xr","title":"X-Ray","modality":"X-Ray","type":"multisite","active":true,"guidance":"Select the anatomical site being requested, then complete the clinical indicators. Osteoarthritis is typically a clinical diagnosis — X-ray is not routinely needed. X-rays to assist diagnosis are reserved for persisting joint pain with features atypical for osteoarthritis.","healthPathwaysUrl":"https://aucklandregion.communityhealthpathways.org/loginfiles/Landing.aspx?from=e39c2299b17441b693394b71ee8af7a9&page=20715.htm","sites":[{"id":"xr_chest","label":"Chest","inlineGuidance":"CXR is the initial investigation for suspected lung cancer — CT Chest is a subsequent step. In patients with acute lower respiratory tract infection, a CXR does not change management in most cases.","groups":[{"title":"Refer for acute assessment — without initial imaging","items":[{"type":"cb","id":"xrc_emerg_1","label":"Haemoptysis with red flags: significant (>20ml single episode or >100ml/hour) or life-threatening; haemodynamically unstable; haemoptysis with hoarseness or stridor; acute dyspnoea and/or chest pain with haemoptysis","shortLabel":"Life-threatening or red flag haemoptysis"},{"type":"cb","id":"xrc_emerg_2","label":"Severe respiratory distress","shortLabel":"Severe respiratory distress"},{"type":"cb","id":"xrc_emerg_3","label":"Suspected large pneumothorax with significant pain, breathlessness, tachycardia","shortLabel":"Suspected large pneumothorax"},{"type":"cb","id":"xrc_emerg_4","label":"Suspected active Tuberculosis and patient is acutely unwell — follow the Tuberculosis pathway","shortLabel":"Suspected active TB — acutely unwell"}]},{"title":"Acute — within 24 hours","items":[{"type":"cb","id":"xrc_24_1","label":"Suspected community-acquired pneumonia (CAP) with unexpectedly severe or atypical presentation, or patient considered at risk of underlying lung pathology (e.g. lung cancer)","shortLabel":"Suspected CAP — severe/atypical or at risk of underlying lung pathology"},{"type":"cb","id":"xrc_24_2","label":"Respiratory tract infection with possible left ventricular failure"," ay.","notFundedDetail":"Routine follow-up of pneumonia findings on chest x-ray other than in the S2 priority scenarios. Asbestos exposure surveillance. Heart murmur unless signs of complications such as heart failure. Lung cancer screening. Follow-up of nodules detected on CXR or CT except with documented recommendation of a hospital secondary care clinician or radiologist. TB screening in absence of positive skin or blood test. Rib views. Chest x-rays for immigration purposes. Routine lateral x-ray view when requesting a PA image. Routine investigation of hypertension. Amiodarone, methotrexate, or nitrofurantoin monitoring in asymptomatic patients.","footnotes":""},{"id":"xr_abdomen","label":"Abdomen","inlineGuidance":"AXR does not reliably diagnose constipation and should not be used to monitor response to treatment. Sensitivity and specificity of AXR for bowel obstruction is low — CT is preferable.","groups":[{"title":"Refer for acute assessment — without initial imaging","items":[{"type":"cb","id":"xra_emerg_1","label":"Acute abdomen including suspected obstruction","shortLabel":"Acute abdomen / suspected obstruction"}]},{"title":"Acute — within 48 hours","items":[{"type":"cb","id":"xra_48_1","label":"Diagnosis of constipation where patient history is unobtainable","shortLabel":"Constipation — patient history unobtainable"},{"type":"cb","id":"xra_48_2","label":"Secondary care clinician, PCRL or radiologist advises referral for acute x-ray","shortLabel":"Advised by secondary care / PCRL / radiologist (acute)"}]},{"title":"P3 — Non-deferrable, within 6 weeks","items":[{"type":"cb","id":"xra_p3_1","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent x-ray","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)"}]},{"title":"S2 — Specified date, within 2 weeks of target date","items":[{"type":"cb","id":"xra_s2_1","label":"Follow-up of radio-opaque renal tract stones with a KUB x-ray (evident on CT scout view)","sh low its expected natural history.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"","guidanceNarrative":"Osteoarthritis is typically a clinical diagnosis and X-ray is not routinely needed. Imaging is not required for effective non-surgical management. There is generally poor correlation between symptoms and X-ray changes. X-rays to help with diagnosis are reserved for patients with persisting joint pain and clinical features atypical for osteoarthritis. Imaging is not a pre-requisite for a trial of steroid injection when a clinical diagnosis has been made.","alternativeManagement":"Musculoskeletal x-rays requested through acute demand services — if septic arthritis is suspected refer for acute assessment without initial imaging.","notFundedDetail":"Loss of range of motion and suspected frozen shoulder unless the condition does not follow its expected natural history.","footnotes":"*1 Clinical features atypical for osteoarthritis: patient younger than 45; recent trauma; prominent signs of inflammation (tender swelling, redness, warmth, early morning stiffness for more than 30 minutes); significant nocturnal pain or pain at rest; weight loss or systemic symptoms; inability to weight bear."},{"id":"xr_spine","label":"Spine","inlineGuidance":"Approximately 90% of acute low back pain in primary care is benign and self-limiting. Between 1-4% will have a spinal fracture and <1% malignancy. Accurate screening for red flags is paramount.","groups":[{"title":"Refer for acute assessment — without initial imaging","items":[{"type":"cb","id":"xrsp_emerg_1","label":"Suspected spinal infection (back pain with fever, recent infection, IV drug use, or immunosuppression) — seek acute orthopaedic advice","shortLabel":"Suspected spinal infection — seek acute orthopaedic advice"},{"type":"cb","id":"xrsp_emerg_2","label":"Suspected cauda equina syndrome (acute back pain with sphincter disturbance, gait disturbance, saddle anaesthesia, loss of bowel/bladder control, abnormal reflexes Advised by secondary care / PCRL / radiologist (non-urgent)"}]}],"outOfCriteriaNote":"Not routinely funded for: acute uncomplicated spine pain within first 6 weeks without red flags (see Back Pain in Adults HealthPathway); suspected spinal OA or chronic spine pain without red flags. History of recent trauma — request imaging via ACC funding.","outOfCriteriaStyle":"warning","healthPathwaysUrl":"","guidanceNarrative":"Approximately 90% of acute low back pain episodes presenting to primary care are benign self-limiting cases that do not warrant x-ray or other imaging studies. Spinal fracture and malignancy are the most common serious pathologies affecting the spine. In patients with low back pain presenting to primary care, between 1% and 4% will have a spinal fracture and in less than 1% malignancy. The low prevalence of both in primary care settings does not justify routine ancillary testing. Accurate screening tools to aid clinical decisions about when to refer for further testing +/- imaging are paramount.","alternativeManagement":"History of recent trauma — request imaging via ACC funding. Progressive neurological deficit — seek Orthopaedic advice.","notFundedDetail":"Acute (within the first six weeks) uncomplicated spine pain without red flags — see local Back Pain in Adults HealthPathway. Suspected spinal osteoarthritis or chronic spine pain without red flags (systemic illness, suspicion of malignancy, risk of infection, inflammatory disease, or osteoporosis).","footnotes":""},{"id":"xr_wrist_hand","label":"Wrist / Hand","inlineGuidance":"X-rays reserved for persisting joint pain with features atypical for OA (patient <45; recent trauma; signs of inflammation; nocturnal pain; weight loss; inability to weight bear).","groups":[{"title":"Refer for acute assessment — without initial imaging","items":[{"type":"cb","id":"xrwh_emerg_1","label":"Suspected septic arthritis","shortLabel":"Suspected septic arthritis"}]},{"title":"P2 — Urgent, within 2 weeks","items":[{"ty  without locking or giving way, joint swelling, or reduced range of motion","shortLabel":"Suspected osteochondritis dissecans — activity-related knee pain with locking/swelling/ROM loss","mandatory":false},{"type":"cb","id":"xrk_p_p3_2","label":"Knee pain persisting for more than two weeks exacerbated by activity, including suspected apophysitis","shortLabel":"Knee pain >2 weeks, activity-related (incl. suspected apophysitis)","mandatory":false},{"type":"cb","id":"xrk_p_p3_3","label":"Unexplained new bony swelling","shortLabel":"Unexplained new bony swelling","mandatory":false},{"type":"cb","id":"xrk_p_p3_4","label":"Clinically and biochemically suspected metabolic bone disease affecting knees (e.g. rickets, scurvy)","shortLabel":"Suspected metabolic bone disease (rickets, scurvy)","mandatory":false},{"type":"cb","id":"xrk_p_p3_5","label":"Bow leg (genu varum) with concern for pathological cause in child older than 2.5 years, with unilateral deformity or symptoms","shortLabel":"Pathological bow leg — child >2.5 years, unilateral or symptomatic","mandatory":false},{"type":"cb","id":"xrk_p_p3_6","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent X-ray","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)","mandatory":false}]}]},{"id":"xr_pelvis_hip_paed","label":"Pelvis / Hip","page":106,"inlineGuidance":"X-ray of the pelvis becomes the preferred investigation for DDH after age 4–6 months when ossification obscures ultrasound landmarks. Perthes disease and slipped upper femoral epiphysis (SUFE) should be considered in children with hip or knee pain.","alternativeManagement":"","notFundedDetail":"Routine DDH screening X-ray in children with no risk factors and normal clinical examination.","outOfCriteriaNote":"Routine DDH screening X-ray in children with no risk factors and normal clinical examination.","outOfCriteriaStyle":"info","footnotes":"","groups":[{"title":"Refer for acute assessment — without initial imaging","mandatory":false,"items":[{"type":"cb","id":"xrph_p_em1","label":"Suspected septic arthritis of the hip","shortLabel":"Suspected septic arthritis of hip","mandatory":false},{"type":"cb","id":"xrph_p_em2","label":"Suspected slipped upper femoral epiphysis (SUFE) — acute severe hip pain in overweight adolescent, inability to weight bear","shortLabel":"Suspected SUFE — acute hip pain in overweight adolescent, unable to weight bear","mandatory":false}]},{"title":"P2 — Urgent, within 2 weeks","mandatory":false,"items":[{"type":"cb","id":"xrph_p_p2_1","label":"Suspected DDH in child aged 5–6 months or older with abnormal hip examination or failed ultrasound screening","shortLabel":"Suspected DDH aged 5–6 months+ with abnormal exam or failed US screening","mandatory":false},{"type":"cb","id":"xrph_p_p2_2","label":"Hip or knee pain in child with limp, suspected Perthes disease","shortLabel":"Hip/knee pain with limp — suspected Perthes disease","mandatory":false},{"type":"cb","id":"xrph_p_p2_3","label":"Secondary care clinician, PCRL or radiologist advises referral for urgent X-ray","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)","mandatory":false}]},{"title":"P3 — Non-deferrable, within 6 weeks","mandatory":false,"items":[{"type":"cb","id":"xrph_p_p3_1","label":"Hip pain in a child persisting for more than 2 weeks without a clear diagnosis","shortLabel":"Hip pain >2 weeks without clear diagnosis","mandatory":false},{"type":"cb","id":"xrph_p_p3_2","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent X-ray","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)","mandatory":false}]}]},{"id":"xr_shoulder_paed","label":"Shoulder","page":109,"inlineGuidance":"Shoulder pain in children is less common than in adults. Always consider referred pain from the neck or chest.","alternativeManagement":"","notFundedDetail":"","outOfCriteriaNote":"","outOfCriteriaStyle":"info","footnotes":"","groups":[{"title":"Refer for acute assessment — without initial imaging","mandatory":false,"items":[{"type":"cb","id":"xrs_p_em1","label":"Suspected septic arthritis","shortLabel":"Suspected septic arthritis","mandatory":false}]},{"title":"P2 — Urgent, within 2 weeks","mandatory":false,"items":[{"type":"cb","id":"xrs_p_p2_1","label":"Undiagnosed persistent bone or joint pain for one week or more with pain at rest or night-waking","shortLabel":"Undiagnosed bone/joint pain ≥1 week with rest pain or night waking","mandatory":false},{"type":"cb","id":"xrs_p_p2_2","label":"Unexplained new bony swelling or joint deformity","shortLabel":"Unexplained new bony swelling or joint deformity","mandatory":false},{"type":"cb","id":"xrs_p_p2_3","label":"Secondary care clinician, PCRL or radiologist advises referral for urgent X-ray","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)","mandatory":false}]},{"title":"P3 — Non-deferrable, within 6 weeks","mandatory":false,"items":[{"type":"cb","id":"xrs_p_p3_1","label":"Persistent unexplained joint or bone pain for more than four weeks","shortLabel":"Unexplained joint/bone pain >4 weeks","mandatory":false},{"type":"cb","id":"xrs_p_p3_2","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent X-ray","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)","mandatory":false}]}]},{"id":"xr_spine_paed","label":"Spine","page":110,"inlineGuidance":"Scoliosis — X-ray recommended prior to secondary care referral. Consider left thoracic curves and rapidly progressing curves as higher priority.","alternativeManagement":"","notFundedDetail":"Simple isolated sacral dimples or pits without red flags — imaging not indicated.","outOfCriteriaNote":"Simple isolated sacral dimples or pits without red flags — imaging not indicated.","outOfCriteriaStyle":"info","footnotes":"","groups":[{"title":"P3 — Non-deferrable, within 6 weeks","mandatory":false,"items":[{"type":"cb","id":"xrsp_p_p3_1","label":"Spinal deformity with community X-ray recommended prior to referral or review in secondary care, especially where scoliosis and any of: severe pain; clinically rapidly progressing curves; left thoracic curves; significant curves or significant rib humps","shortLabel":"Scoliosis or spinal deformity — X-ray recommended prior to secondary care referral","mandatory":false},{"type":"cb","id":"xrsp_p_p3_2","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent spine X-ray","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)","mandatory":false}]}]},{"id":"xr_wrist_hand_paed","label":"Wrist / Hand","page":111,"inlineGuidance":"Bone age assessment is a common paediatric request — only funded if recommended by a paediatric or secondary care specialist.","alternativeManagement":"","notFundedDetail":"Routine bone age X-ray without specialist recommendation.","outOfCriteriaNote":"Routine bone age X-ray without specialist recommendation.","outOfCriteriaStyle":"info","footnotes":"","groups":[{"title":"Refer for acute assessment — without initial imaging","mandatory":false,"items":[{"type":"cb","id":"xrwh_p_em1","label":"Suspected septic arthritis","shortLabel":"Suspected septic arthritis","mandatory":false}]},{"title":"P2 — Urgent, within 2 weeks","mandatory":false,"items":[{"type":"cb","id":"xrwh_p_p2_1","label":"Undiagnosed persistent bone or joint pain for one week or more with pain at rest or night-waking","shortLabel":"Undiagnosed bone/joint pain ≥1 week with rest pain or night waking","mandatory":false},{"type":"cb","id":"xrwh_p_p2_2","label":"Unexplained new bony swelling or joint deformity","shortLabel":"Unexplained new bony swelling or joint deformity","mandatory":false},{"type":"cb","id":"xrwh_p_p2_3","label":"Secondary care clinician, PCRL or radiologist advises referral for urgent X-ray","shortLabel":"Advised by secondary care / PCRL / radiologist (urgent)","mandatory":false}]},{"title":"P3 — Non-deferrable, within 6 weeks","mandatory":false,"items":[{"type":"cb","id":"xrwh_p_p3_1","label":"Persistent unexplained joint or bone pain for more than four weeks","shortLabel":"Unexplained joint/bone pain >4 weeks","mandatory":false},{"type":"cb","id":"xrwh_p_p3_2","label":"Bone age X-ray recommended by paediatric or secondary care specialist","shortLabel":"Bone age X-ray — specialist recommended","mandatory":false},{"type":"cb","id":"xrwh_p_p3_3","label":"Secondary care clinician, PCRL or radiologist advises referral for non-urgent X-ray","shortLabel":"Advised by secondary care / PCRL / radiologist (non-urgent)","mandatory":false}]}]}]}]};
var CRITERIA_VERSION = "v3.4.4";

function getParam(name) {
  var s = window.location.search;
  if (!s) return null;
  var pairs = s.substring(1).split('&');
  for (var i = 0; i < pairs.length; i++) {
    var kv = pairs[i].split('=');
    if (decodeURIComponent(kv[0]) === name) {
      return kv[1] ? decodeURIComponent(kv[1].replace(/\+/g,' ')) : null;
    }
  }
  return null;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function priorityBadge(title) {
  var l = (title || '').toLowerCase();
  if (l.indexOf('without initial imaging') !== -1 || l.indexOf('refer for acute') !== -1) return '<span class="b-em">Emergency</span>';
  if (l.indexOf('acute') !== -1 && l.indexOf('24') !== -1) return '<span class="b-ac">Acute 24hr</span>';
  if (l.indexOf('acute') !== -1) return '<span class="b-ac">Acute 48hr</span>';
  if (l.indexOf('p2') !== -1) return '<span class="b-p2">P2 &mdash; 2 wks</span>';
  if (l.indexOf('p3') !== -1) return '<span class="b-p3">P3 &mdash; 6 wks</span>';
  if (l.indexOf('p4') !== -1) return '<span class="b-p4">P4 &mdash; 6&ndash;12 wks</span>';
  return '';
}

function renderGroups(groups) {
  var h = '';
  for (var g = 0; g < groups.length; g++) {
    var grp = groups[g];
    h += '<div class="group">';
    h += '<div class="group-hd">' + esc(grp.title) + priorityBadge(grp.title) + '</div>';
    var items = grp.items || [];
    for (var k = 0; k < items.length; k++) {
      var item = items[k];
      var cbId = 'cb_' + esc(item.id);
      h += '<div class="item">';
      h += '<input type="checkbox" id="' + cbId + '">';
      h += '<label for="' + cbId + '">' + esc(item.label);
      if (item.mandatory) h += '<span class="mandatory">(mandatory)</span>';
      h += '</label></div>';
    }
    h += '</div>';
  }
  return h;
}

function renderSite(site) {
  var h = '<div class="site-hd">' + esc(site.label) + '</div>';
  if (site.inlineGuidance) {
    h += '<div class="inline-g">' + esc(site.inlineGuidance) + '</div>';
  }
  h += renderGroups(site.groups || []);
  if (site.outOfCriteriaNote) {
    h += '<div class="ooc"><div class="ooc-hd">Not funded / out of criteria</div>' + esc(site.outOfCriteriaNote) + '</div>';
  }
  if (site.alternativeManagement) {
    h += '<div class="alt"><strong>Alternative management:</strong> ' + esc(site.alternativeManagement) + '</div>';
  }
  return h;
}

function getExamById(id) {
  var all = (CRITERIA.exams || []).concat(CRITERIA.paedExams || []);
  for (var i = 0; i < all.length; i++) if (all[i].id === id) return all[i];
  return null;
}

function render() {
  var app = document.getElementById('app');
  var examId = getParam('exam');
  var sitesParam = getParam('sites');
  var siteIds = sitesParam ? sitesParam.split(',') : [];
  for (var t = 0; t < siteIds.length; t++) siteIds[t] = siteIds[t].replace(/^\s+|\s+$/g,'');

  // No exam — show exam list
  if (!examId) {
    var exams = CRITERIA.exams || [];
    var h = '<div class="hd"><div class="hd-title">CRR Referral Criteria</div><div class="hd-sub">Select exam type</div></div>';
    h += '<div class="content"><ul class="exam-list">';
    for (var i = 0; i < exams.length; i++) {
      h += '<li><a href="?exam=' + esc(exams[i].id) + '">' + esc(exams[i].title) + '<span class="mod">' + esc(exams[i].modality) + '</span></a></li>';
    }
    h += '</ul></div>';
    app.innerHTML = h;
    return;
  }

  var exam = getExamById(examId);
  if (!exam) {
    app.innerHTML = '<div class="hd"><div class="hd-title">Not found</div></div><div class="content err">Exam &ldquo;' + esc(examId) + '&rdquo; not found.</div>';
    return;
  }

  var hpUrl = exam.healthPathwaysUrl || '';
  var hpLink = hpUrl ? ' <a href="' + esc(hpUrl) + '" target="_blank" style="font-size:11px">View HealthPathways &rsaquo;</a>' : '';
  var h = '<div class="hd"><div class="hd-title">' + esc(exam.title) + '</div><div class="hd-sub">Community Referred Radiology &mdash; Referral Criteria</div></div>';
  h += '<div class="content">';

  if (exam.guidance) {
    h += '<div class="guidance">' + esc(exam.guidance) + hpLink + '</div>';
  }

  if (exam.type === 'singlesite') {
    h += renderGroups(exam.groups || []);
  } else {
    var sites = exam.sites || [];
    if (siteIds.length === 0) {
      // Show site selector
      h += '<p style="margin-bottom:8px;font-size:12px;color:#4a5a68">Select anatomical site:</p><ul class="site-list">';
      for (var j = 0; j < sites.length; j++) {
        h += '<li><a href="?exam=' + esc(examId) + '&sites=' + esc(sites[j].id) + '">' + esc(sites[j].label) + '</a></li>';
      }
      h += '</ul>';
    } else {
      var found = false;
      for (var m = 0; m < sites.length; m++) {
        for (var n = 0; n < siteIds.length; n++) {
          if (siteIds[n] === sites[m].id) { h += renderSite(sites[m]); found = true; break; }
        }
      }
      if (!found) {
        h += '<div class="err">Site &ldquo;' + esc(sitesParam) + '&rdquo; not found for this exam.</div>';
      }
    }
  }

  h += '</div><div class="footer">CRR Criteria &mdash; ' + esc(CRITERIA_VERSION) + ' &mdash; For clinical use only. Always check HealthPathways for local guidance.</div>';
  app.innerHTML = h;
}

render();
</script>
