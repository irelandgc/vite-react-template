<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CRR Release Notes &amp; Announcements</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/crr-criteria/shared/crr-design-system.css">
<style>
  body { background: var(--mist); }
  .rl-wrap { max-width: 880px; margin: 0 auto; padding: 28px 20px 60px; }
  .rl-hd { display: flex; align-items: center; gap: 14px; padding-bottom: 18px; border-bottom: 1px solid var(--rule); margin-bottom: 22px; }
  .rl-hd .logo { font-size: 11px; padding: 5px 10px; }
  .rl-hd h1 { font-size: 20px; font-weight: 600; color: var(--ink); letter-spacing: -0.2px; }
  .rl-hd .sub { font-size: 12px; color: var(--mid); margin-top: 2px; }
  .rl-filters { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .rl-filter { font-size: 11px; padding: 5px 11px; border-radius: 14px; border: 1px solid var(--rule); background: #fff; color: var(--mid); cursor: pointer; font-weight: 500; }
  .rl-filter:hover { border-color: var(--accent); color: var(--accent); }
  .rl-filter.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .rl-entry { background: #fff; border: 1px solid var(--rule); border-radius: 10px; padding: 18px 22px; margin-bottom: 14px; }
  .rl-entry-hd { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .rl-type { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; padding: 3px 9px; border-radius: 10px; }
  .rl-type-release { background: #e8f2fa; color: #145a84; }
  .rl-type-criteria_update { background: #fff8e1; color: #92400e; }
  .rl-type-announcement { background: #f0fdf4; color: #047857; }
  .rl-date { font-size: 11px; color: var(--mid); }
  .rl-apps { font-size: 10px; color: var(--mid); margin-left: auto; }
  .rl-title { font-size: 16px; font-weight: 600; color: var(--ink); margin: 4px 0 12px; }
  .rl-body { font-size: 13px; line-height: 1.65; color: #2a2d33; }
  .rl-body h1, .rl-body h2, .rl-body h3 { margin: 14px 0 6px; font-weight: 600; color: var(--ink); }
  .rl-body h1 { font-size: 15px; } .rl-body h2 { font-size: 14px; } .rl-body h3 { font-size: 13px; }
  .rl-body p { margin: 6px 0; }
  .rl-body ul, .rl-body ol { margin: 6px 0 6px 22px; }
  .rl-body li { margin: 2px 0; }
  .rl-body code { font-family: var(--mono); background: var(--lite); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .rl-body a { color: var(--accent); text-decoration: underline; }
  .rl-body strong { font-weight: 600; }
  .rl-body em { font-style: italic; }
  .rl-empty { padding: 60px 20px; text-align: center; color: var(--mid); font-size: 13px; font-style: italic; }
  .rl-error { padding: 18px; background: var(--fail-bg); border: 1px solid var(--fail-bd); color: var(--fail); border-radius: 8px; font-size: 12px; margin-bottom: 14px; }
  .rl-back { font-size: 11px; color: var(--mid); margin-left: auto; }
  .rl-back a { color: var(--accent); }
</style>
</head>
<body>

<div class="rl-wrap">
  <div class="rl-hd">
    <span class="logo">CRR</span>
    <div>
      <h1>Release notes &amp; announcements</h1>
      <div class="sub">Community Referred Radiology — Tool updates, criteria changes, and programme messages</div>
    </div>
    <span class="rl-back"><a href="javascript:history.length>1?history.back():window.close()">&larr; Back</a></span>
  </div>

  <div class="rl-filters" id="filters">
    <button class="rl-filter on" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="rl-filter" data-filter="release" onclick="setFilter('release')">Releases</button>
    <button class="rl-filter" data-filter="criteria_update" onclick="setFilter('criteria_update')">Criteria updates</button>
    <button class="rl-filter" data-filter="announcement" onclick="setFilter('announcement')">Announcements</button>
  </div>

  <div id="entries"><div class="rl-empty">Loading…</div></div>
</div>

<script>
var API_BASE = 'https://crr-criteria-api.fk4dsrmq5r.workers.dev';
var entries = [];
var currentFilter = 'all';

// Mark the latest entry as seen across all calling apps when the page is opened
function markAllSeen() {
  try {
    if (!entries.length) return;
    var maxId = entries.reduce(function(m, e){ return Math.max(m, e.id || 0); }, 0);
    ['viewer', 'triage', 'admin'].forEach(function(app) {
      localStorage.setItem('crr-lastSeenReleaseId-' + app, String(maxId));
    });
  } catch (e) { /* localStorage may be unavailable */ }
}

// ── Tiny markdown renderer (safe; no innerHTML of raw user content) ─────────
// Handles: # headings, **bold**, *italic*, `code`, [text](url), - lists, paragraphs.
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function renderInlineV2(s) {
  s = escapeHtml(s);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, function(_m, txt, url) {
    return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + txt + '</a>';
  });
  return s;
}
function renderMarkdown(src) {
  if (!src) return '';
  var lines = src.replace(/\r\n/g, '\n').split('\n');
  var out = [];
  var i = 0;
  while (i < lines.length) {
    var line = lines[i];
    var trim = line.trim();
    if (!trim) { i++; continue; }
    var h = trim.match(/^(#{1,3})\s+(.+)$/);
    if (h) {
      var lvl = h[1].length;
      out.push('<h' + lvl + '>' + renderInlineV2(h[2]) + '</h' + lvl + '>');
      i++; continue;
    }
    if (/^[-*]\s+/.test(trim)) {
      out.push('<ul>');
      while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
        out.push('<li>' + renderInlineV2(lines[i].trim().replace(/^[-*]\s+/, '')) + '</li>');
        i++;
      }
      out.push('</ul>');
      continue;
    }
    if (/^\d+\.\s+/.test(trim)) {
      out.push('<ol>');
      while (i < lines.length && /^\d+\.\s+/.test(lines[i].trim())) {
        out.push('<li>' + renderInlineV2(lines[i].trim().replace(/^\d+\.\s+/, '')) + '</li>');
        i++;
      }
      out.push('</ol>');
      continue;
    }
    // Paragraph: gather consecutive non-blank, non-special lines
    var para = [trim];
    i++;
    while (i < lines.length) {
      var nxt = lines[i].trim();
      if (!nxt) break;
      if (/^(#{1,3})\s+/.test(nxt)) break;
      if (/^[-*]\s+/.test(nxt)) break;
      if (/^\d+\.\s+/.test(nxt)) break;
      para.push(nxt);
      i++;
    }
    out.push('<p>' + renderInlineV2(para.join(' ')) + '</p>');
  }
  return out.join('\n');
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    var d = new Date(iso);
    return d.toLocaleDateString('en-NZ', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch (e) { return iso; }
}

function typeLabel(t) {
  if (t === 'release') return 'Release';
  if (t === 'criteria_update') return 'Criteria update';
  return 'Announcement';
}

function setFilter(f) {
  currentFilter = f;
  Array.prototype.forEach.call(document.querySelectorAll('.rl-filter'), function(b) {
    if (b.dataset.filter === f) b.classList.add('on'); else b.classList.remove('on');
  });
  render();
}

function render() {
  var host = document.getElementById('entries');
  var visible = entries.filter(function(e) {
    if (currentFilter === 'all') return true;
    return e.type === currentFilter;
  });
  if (!visible.length) {
    host.innerHTML = '<div class="rl-empty">No entries yet.</div>';
    return;
  }
  host.innerHTML = visible.map(function(e) {
    var typeCls = 'rl-type-' + (e.type || 'announcement');
    var appsLabel = (e.apps && e.apps !== 'all') ? ('Apps: ' + e.apps) : '';
    return '<div class="rl-entry">' +
      '<div class="rl-entry-hd">' +
        '<span class="rl-type ' + typeCls + '">' + typeLabel(e.type) + '</span>' +
        '<span class="rl-date">' + fmtDate(e.published_at) + '</span>' +
        (appsLabel ? '<span class="rl-apps">' + appsLabel + '</span>' : '') +
      '</div>' +
      '<div class="rl-title">' + escapeHtml(e.title || '') + '</div>' +
      '<div class="rl-body">' + renderMarkdown(e.body || '') + '</div>' +
    '</div>';
  }).join('');
}

function load() {
  fetch(API_BASE + '/api/releases')
    .then(function(r) { return r.json(); })
    .then(function(j) {
      entries = (j.entries || []);
      render();
      markAllSeen();
    })
    .catch(function(err) {
      document.getElementById('entries').innerHTML =
        '<div class="rl-error">Could not load releases: ' + escapeHtml(String(err)) + '</div>';
    });
}

load();
</script>

</body>
</html>
