//  RELEASES TAB — create/edit release notes & announcements
// ══════════════════════════════════════════════════════════

// Mirrors public/crr-criteria/releases/index.html. Supports # headings, **bold**, *italic*, `code`,
// [text](url) with safe-URL coercion, - * • ▪ ◦ ‒ – — bullet chars, 1. ordered lists.
const BULLET_RE = /^(?:[-*•▪◦‒–—])\s+/;
function safeUrlPrev(u){
  u = String(u||'').trim();
  if(/^(?:javascript|data|vbscript|file):/i.test(u)) return '#';
  if(/^https?:\/\//i.test(u)) return u;
  if(/^mailto:|^tel:|^\/|^#/.test(u)) return u;
  if(/^(?:www\.)?[a-z0-9-]+\.[a-z]{2,}/i.test(u)) return 'https://' + u.replace(/^https?:\/\//i,'');
  return u;
}
function renderReleaseMarkdown(src){
  if(!src) return '';
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const inl = s => {
    s = esc(s);
    s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
    s = s.replace(/\[([^\]]+)\]\s*\(([^)\s]+)\)/g, (_m,t,u)=>`<a href="${safeUrlPrev(u)}" target="_blank" rel="noopener noreferrer">${t}</a>`);
    return s;
  };
  const lines = src.replace(/\r\n/g,'\n').split('\n');
  const out = []; let i = 0;
  while(i<lines.length){
    const t = lines[i].trim();
    if(!t){ i++; continue; }
    const h = t.match(/^(#{1,3})\s+(.+)$/);
    if(h){ out.push(`<h${h[1].length}>${inl(h[2])}</h${h[1].length}>`); i++; continue; }
    if(BULLET_RE.test(t)){
      out.push('<ul>');
      while(i<lines.length && BULLET_RE.test(lines[i].trim())){
        out.push('<li>' + inl(lines[i].trim().replace(BULLET_RE,'')) + '</li>');
        i++;
      }
      out.push('</ul>'); continue;
    }
    if(/^\d+\.\s+/.test(t)){
      out.push('<ol>');
      while(i<lines.length && /^\d+\.\s+/.test(lines[i].trim())){
        out.push('<li>' + inl(lines[i].trim().replace(/^\d+\.\s+/,'')) + '</li>');
        i++;
      }
      out.push('</ol>'); continue;
    }
    const para = [t]; i++;
    while(i<lines.length){
      const n = lines[i].trim();
      if(!n) break;
      if(/^(#{1,3})\s+/.test(n)) break;
      if(BULLET_RE.test(n)) break;
      if(/^\d+\.\s+/.test(n)) break;
      para.push(n); i++;
    }
    out.push('<p>' + inl(para.join(' ')) + '</p>');
  }
  return out.join('\n');
}

function ReleasesTab({show}){
  const [entries,setEntries]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [error,setError]=React.useState(null);
  const [editing,setEditing]=React.useState(null); // null | {} (new) | row (existing)

  const empty = ()=>({title:'',body:'',type:'announcement',apps:'all',status:'draft'});

  const load = React.useCallback(async()=>{
    setLoading(true); setError(null);
    try{
      const res=await api('/api/admin/releases');
      if(res?.entries) setEntries(res.entries);
      else if(res?.error) setError(res.error);
    }catch(e){ setError(e.message); }
    finally{ setLoading(false); }
  },[]);

  React.useEffect(()=>{ load(); },[load]);

  async function save(){
    if(!editing) return;
    if(!editing.title?.trim() || !editing.body?.trim()){ show('Title and body are required','warn'); return; }
    const payload={
      title: editing.title.trim(),
      body: editing.body,
      type: editing.type || 'announcement',
      apps: editing.apps || 'all',
      status: editing.status || 'draft',
    };
    try{
      const res = editing.id
        ? await api(`/api/admin/releases/${editing.id}`,{method:'PUT',body:JSON.stringify(payload)})
        : await api('/api/admin/releases',{method:'POST',body:JSON.stringify(payload)});
      if(res?.success){
        show(editing.id?'Release updated':'Release created','ok');
        setEditing(null);
        load();
      } else {
        show(res?.error||'Save failed','warn');
      }
    }catch(e){ show('Save failed: '+e.message,'warn'); }
  }

  async function remove(id){
    if(!confirm('Delete this entry? This cannot be undone.')) return;
    try{
      const res = await api(`/api/admin/releases/${id}`,{method:'DELETE'});
      if(res?.success){ show('Deleted','ok'); load(); }
      else show(res?.error||'Delete failed','warn');
    }catch(e){ show('Delete failed: '+e.message,'warn'); }
  }

  const typeLabel = (t)=> t==='release'?'Release': t==='criteria_update'?'Criteria update':'Announcement';
  const typeColor = (t)=> t==='release'?{bg:'#e8f2fa',fg:'#145a84'}: t==='criteria_update'?{bg:'#fff8e1',fg:'#92400e'}:{bg:'#e6f4ec',fg:'#1a6640'};
  const APP_OPTIONS = [
    {val:'all',label:'All apps'},
    {val:'viewer',label:'Viewer only'},
    {val:'triage',label:'Triage only'},
    {val:'viewer,triage',label:'Viewer + Triage'},
  ];

  if(editing){
    return (
      <div style={{padding:20,overflow:'auto',height:'calc(100vh - 130px)'}}>
        <div style={{maxWidth:760,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <h2 style={{fontSize:16,fontWeight:700,color:C.navy}}>{editing.id?'Edit release':'New release'}</h2>
            <button onClick={()=>setEditing(null)} style={{fontSize:12,padding:'5px 12px',background:'#fff',color:C.mid,border:`1px solid ${C.rule}`,borderRadius:3,cursor:'pointer',fontFamily:font}}>Cancel</button>
          </div>
          <div style={{background:'#fff',border:`1px solid ${C.rule}`,borderRadius:3,padding:16}}>
            <label style={{display:'block',fontSize:11,fontWeight:600,color:C.navy,marginBottom:4}}>Title</label>
            <input value={editing.title||''} onChange={e=>setEditing({...editing,title:e.target.value})}
                   style={{width:'100%',fontSize:13,padding:'7px 10px',border:`1px solid ${C.rule}`,borderRadius:3,fontFamily:font,marginBottom:12}}/>

            <div style={{display:'flex',gap:12,marginBottom:12}}>
              <div style={{flex:1}}>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:C.navy,marginBottom:4}}>Type</label>
                <select value={editing.type||'announcement'} onChange={e=>setEditing({...editing,type:e.target.value})}
                        style={{width:'100%',fontSize:13,padding:'6px 10px',border:`1px solid ${C.rule}`,borderRadius:3,fontFamily:font}}>
                  <option value='release'>Release</option>
                  <option value='criteria_update'>Criteria update</option>
                  <option value='announcement'>Announcement</option>
                </select>
              </div>
              <div style={{flex:1}}>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:C.navy,marginBottom:4}}>Show in</label>
                <select value={editing.apps||'all'} onChange={e=>setEditing({...editing,apps:e.target.value})}
                        style={{width:'100%',fontSize:13,padding:'6px 10px',border:`1px solid ${C.rule}`,borderRadius:3,fontFamily:font}}>
                  {APP_OPTIONS.map(o=><option key={o.val} value={o.val}>{o.label}</option>)}
                </select>
              </div>
              <div style={{flex:1}}>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:C.navy,marginBottom:4}}>Status</label>
                <select value={editing.status||'draft'} onChange={e=>setEditing({...editing,status:e.target.value})}
                        style={{width:'100%',fontSize:13,padding:'6px 10px',border:`1px solid ${C.rule}`,borderRadius:3,fontFamily:font}}>
                  <option value='draft'>Draft (hidden)</option>
                  <option value='published'>Published (visible)</option>
                </select>
              </div>
            </div>

            <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              <div style={{flex:1,minWidth:0}}>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:C.navy,marginBottom:4}}>Body (Markdown)</label>
                <textarea value={editing.body||''} onChange={e=>setEditing({...editing,body:e.target.value})}
                          placeholder={'# Heading\n**bold**, *italic*, `code`, [link](https://…)\n\n- list item one\n- list item two\n\nLeave a blank line between paragraphs.'}
                          style={{width:'100%',minHeight:300,fontSize:13,padding:10,border:`1px solid ${C.rule}`,borderRadius:3,fontFamily:mono,resize:'vertical'}}/>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:C.navy,marginBottom:4}}>Preview</label>
                <div style={{minHeight:300,maxHeight:600,overflow:'auto',padding:'10px 14px',border:`1px solid ${C.rule}`,borderRadius:3,background:'#fff',fontSize:13,lineHeight:1.55,color:'#2a2d33'}}
                     dangerouslySetInnerHTML={{__html: renderReleaseMarkdown(editing.body||'') || '<span style="color:#8b919a;font-style:italic">Preview will appear here as you type.</span>'}}/>
              </div>
            </div>
            <div style={{fontSize:11,color:C.mid,marginTop:6}}>Tip: leave a blank line between paragraphs. Use <code style={{background:C.lite,padding:'1px 4px',borderRadius:2}}>- item</code> for bullets, <code style={{background:C.lite,padding:'1px 4px',borderRadius:2}}>**word**</code> for bold.</div>

            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12}}>
              <button onClick={()=>setEditing(null)} style={{fontSize:12,padding:'6px 14px',background:'#fff',color:C.mid,border:`1px solid ${C.rule}`,borderRadius:3,cursor:'pointer',fontFamily:font}}>Cancel</button>
              <button onClick={save} style={{fontSize:12,padding:'6px 16px',background:C.teal,color:'#fff',border:'none',borderRadius:3,cursor:'pointer',fontFamily:font,fontWeight:600}}>{editing.status==='published'?'Save & publish':'Save draft'}</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{padding:20,overflow:'auto',height:'calc(100vh - 130px)'}}>
      <div style={{maxWidth:900,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:12}}>
          <div>
            <h2 style={{fontSize:16,fontWeight:700,color:C.navy,marginBottom:2}}>Releases &amp; announcements</h2>
            <p style={{fontSize:12,color:C.mid}}>Published entries are visible on <a href='/crr-criteria/releases/' target='_blank' rel='noopener' style={{color:C.teal}}>the shared releases page</a> and trigger the bell indicator in the selected apps.</p>
          </div>
          <button onClick={()=>setEditing(empty())} style={{fontSize:12,padding:'6px 14px',background:C.teal,color:'#fff',border:'none',borderRadius:3,cursor:'pointer',fontFamily:font,fontWeight:600}}>+ New entry</button>
        </div>

        {error && <div style={{padding:10,background:C.failBg,color:C.fail,border:`1px solid ${C.fail}`,borderRadius:3,fontSize:12,marginBottom:12}}>{error}</div>}

        <div style={{background:'#fff',border:`1px solid ${C.rule}`,borderRadius:3}}>
          {loading?<div style={{padding:20,textAlign:'center',color:C.mid}}>Loading…</div>
          : entries.length===0?<div style={{padding:20,textAlign:'center',color:C.mid}}>No entries yet — click <strong>+ New entry</strong> to add the first one.</div>
          : entries.map(e=>{
              const tc=typeColor(e.type);
              const isDraft = e.status!=='published';
              return (
                <div key={e.id} style={{padding:'12px 14px',borderBottom:`1px solid ${C.mist}`,display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:2,background:tc.bg,color:tc.fg,textTransform:'uppercase',letterSpacing:0.4}}>{typeLabel(e.type)}</span>
                  {isDraft && <span style={{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:2,background:'#fee2e2',color:'#991b1b',textTransform:'uppercase',letterSpacing:0.4}}>Draft</span>}
                  <span style={{fontSize:13,color:C.navy,fontWeight:600,flex:1}}>{e.title}</span>
                  <span style={{fontSize:11,color:C.mid}}>{e.apps==='all'?'All apps':e.apps}</span>
                  <span style={{fontSize:11,color:C.mid,minWidth:90,textAlign:'right'}}>{e.published_at?new Date(e.published_at).toLocaleDateString():'—'}</span>
                  <button onClick={()=>setEditing(e)} style={{fontSize:11,padding:'4px 10px',background:'#fff',color:C.teal,border:`1px solid ${C.teal}`,borderRadius:3,cursor:'pointer',fontFamily:font}}>Edit</button>
                  <button onClick={()=>remove(e.id)} style={{fontSize:11,padding:'4px 10px',background:'#fff',color:C.fail,border:`1px solid ${C.fail}`,borderRadius:3,cursor:'pointer',fontFamily:font}}>Delete</button>
                </div>
              );
            })}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
//  AUDIT LOG TAB
// ══════════════════════════════════════════════════════════

function AuditTab(){
  const [entries,setEntries]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  React.useEffect(()=>{
    (async()=>{
      try{
        const res=await api("/api/admin/audit");
        if(res?.entries)setEntries(res.entries);
      }catch(e){console.error(e);}
      finally{setLoading(false);}
    })();
  },[]);
  const ac={create:{bg:C.addBg,fg:C.add},update:{bg:C.chgBg,fg:C.chg},delete:{bg:C.delBg,fg:C.del},publish:{bg:"#eef2ff",fg:"#4f46e5"}};
  return (
    <div style={{padding:20,maxWidth:700,margin:"0 auto"}}>
      <h2 style={{fontSize:16,fontWeight:700,color:C.navy,marginBottom:4}}>Audit Log</h2>
      <p style={{fontSize:12,color:C.mid,marginBottom:16}}>Every edit, publish, and version action tracked.</p>
      <div style={{background:"#fff",border:`1px solid ${C.rule}`,borderRadius:3}}>
        <div style={{background:C.navy,color:"#fff",padding:"10px 14px",fontSize:11,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase"}}>Recent Activity</div>
        {loading?<div style={{padding:20,textAlign:"center",color:C.mid}}>Loading…</div>:
        entries.length===0?<div style={{padding:20,textAlign:"center",color:C.mid}}>No audit entries yet</div>:
        entries.map(e=>{const a=ac[e.action]||ac.update;return(
          <div key={e.id} style={{padding:"10px 14px",borderBottom:`1px solid ${C.mist}`,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:2,background:a.bg,color:a.fg,textTransform:"uppercase"}}>{e.action}</span>
            <span style={{fontSize:12,color:C.navy,fontWeight:600,flex:1}}>{e.entity_type} #{e.entity_id}</span>
            <span style={{fontSize:11,color:C.mid}}>{e.performed_by}</span>
            <span style={{fontSize:10,color:C.mid}}>{new Date(e.performed_at).toLocaleString()}</span>
          </div>
        );})}
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(CRRAdmin), document.getElementById("root"));
</script>
</body>
