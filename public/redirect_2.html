<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 18px;
            color: #1F3864;
            margin: 0 0 12px 0;
        }
        p {
            font-size: 13px;
            color: #666;
            margin: 8px 0;
            line-height: 1.5;
        }
        .status {
            font-size: 14px;
            color: #2E75B6;
            margin: 16px 0;
            font-weight: bold;
        }
        .manual {
            display: none;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }
        .manual a {
            color: #2E75B6;
            word-break: break-all;
            font-size: 12px;
        }
        .manual-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 20px;
            background: #2E75B6;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }
        .manual-btn:hover {
            background: #1F5A8C;
        }
        .error {
            color: #993C1D;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CRR Browser Redirect</h1>
        <p class="status" id="status">Opening application...</p>
        <p id="info">Please wait while we open the application in your default browser.</p>

        <div class="manual" id="manual">
            <p>Automatic redirect was not possible. Please open the following link in Chrome or Edge:</p>
            <p><a id="manual-link" href="#" target="_blank"></a></p>
            <button class="manual-btn" id="copy-btn" onclick="copyUrl()">Copy link to clipboard</button>
            <p class="error" id="copy-status"></p>
        </div>
    </div>

    <script>
        // Parse the target URL from the query string
        function getTargetUrl() {
            var search = window.location.search.substring(1);
            var params = search.split('&');
            for (var i = 0; i < params.length; i++) {
                var pair = params[i].split('=');
                if (pair[0] === 'url') {
                    return decodeURIComponent(pair.slice(1).join('='));
                }
            }
            return null;
        }

        // Detect Windows version from User Agent string
        // Returns major version number (10, 6, etc.) or 0 if not Windows
        function getWindowsVersion() {
            var ua = navigator.userAgent;
            // Windows 11 reports as Windows NT 10.0 (same as Win 10)
            var match = ua.match(/Windows NT (\d+)\.(\d+)/);
            if (match) {
                return parseInt(match[1], 10);
            }
            return 0;
        }

        // Attempt to close the IE window
        function closeWindow() {
            try {
                window.opener = window;
                window.close();
            } catch (e) {
                // If close fails, hide the page content
                document.body.innerHTML = '<div class="container"><p>You can close this window.</p></div>';
            }
        }

        // Show the manual fallback link
        function showManualFallback(targetUrl, message) {
            var status = document.getElementById('status');
            var info = document.getElementById('info');
            var manual = document.getElementById('manual');
            var manualLink = document.getElementById('manual-link');

            status.textContent = 'Manual action required';
            status.style.color = '#993C1D';
            info.textContent = message || 'We could not open the application automatically.';
            manual.style.display = 'block';
            manualLink.href = targetUrl;
            manualLink.textContent = targetUrl;
        }

        // Copy URL to clipboard (IE-compatible)
        function copyUrl() {
            var targetUrl = getTargetUrl();
            var copyStatus = document.getElementById('copy-status');
            try {
                if (window.clipboardData) {
                    // IE method
                    window.clipboardData.setData('Text', targetUrl);
                    copyStatus.textContent = 'Link copied to clipboard.';
                    copyStatus.style.color = '#0F6E56';
                } else {
                    // Modern fallback (shouldn't reach here in IE context)
                    var textArea = document.createElement('textarea');
                    textArea.value = targetUrl;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    copyStatus.textContent = 'Link copied to clipboard.';
                    copyStatus.style.color = '#0F6E56';
                }
            } catch (e) {
                copyStatus.textContent = 'Could not copy. Please select and copy the link above manually.';
                copyStatus.style.color = '#993C1D';
            }
        }

        // Attempt ActiveX launch, returns true if successful
        function tryActiveX(targetUrl) {
            try {
                document.getElementById('status').textContent = 'Opening in default browser...';
                var shell = new ActiveXObject('WScript.Shell');
                shell.Run(targetUrl);

                setTimeout(function() {
                    closeWindow();
                }, 1500);
                return true;
            } catch (e) {
                return false;
            }
        }

        // Main redirect logic
        function redirect() {
            var targetUrl = getTargetUrl();

            // Validate we have a target URL
            if (!targetUrl) {
                showManualFallback('', 'No target URL was specified.');
                document.getElementById('manual').style.display = 'none';
                document.getElementById('info').textContent = 'Error: No target URL was provided in the redirect request. Please contact support.';
                return;
            }

            // Basic URL validation
            if (targetUrl.indexOf('http') !== 0) {
                showManualFallback('', 'Invalid target URL.');
                document.getElementById('manual').style.display = 'none';
                document.getElementById('info').textContent = 'Error: The target URL appears to be invalid. Please contact support.';
                return;
            }

            var winVersion = getWindowsVersion();

            // Strategy 1: Windows NT 10.0+ — try microsoft-edge: protocol
            // Desktop Windows 10/11 will always have Edge (built-in, cannot be removed).
            // However, Windows Server 2016/2019/2022 also report as NT 10.0 but do NOT
            // ship with Edge by default. This is common in terminal server / RDS / Citrix
            // deployments where MedTech runs on a server and clinicians connect via
            // thin clients. To handle this, we attempt the Edge protocol and set a
            // timeout: if the page is still visible after 2.5 seconds (meaning Edge
            // did not launch), we fall through to the ActiveX method.
            if (winVersion >= 10) {
                try {
                    document.getElementById('status').textContent = 'Opening in Microsoft Edge...';
                    window.location.href = 'microsoft-edge:' + targetUrl;

                    // If Edge launched successfully, the browser will take focus
                    // and this timeout will close the IE window.
                    // If Edge is NOT installed (e.g. terminal server), the protocol
                    // handler silently fails and the page remains visible — the
                    // timeout then falls through to ActiveX.
                    setTimeout(function() {
                        // If we're still here, Edge likely didn't launch.
                        // Check if document is still visible/active — if so,
                        // the Edge protocol didn't work (terminal server scenario).
                        // Try ActiveX as fallback.
                        if (!tryActiveX(targetUrl)) {
                            // ActiveX also failed — show manual fallback
                            showManualFallback(targetUrl,
                                'Automatic browser launch is not available in this environment. ' +
                                'Please copy the link below and paste it into Chrome or Edge.');
                        }
                    }, 2500);
                    return;
                } catch (e) {
                    // Edge protocol threw an error — fall through immediately
                }
            }

            // Strategy 2: Older Windows (pre-NT 10.0) — use ActiveX WScript.Shell
            if (!tryActiveX(targetUrl)) {
                // Strategy 3: Manual fallback
                showManualFallback(targetUrl,
                    'Automatic browser launch is not available in this environment. ' +
                    'Please copy the link below and paste it into Chrome or Edge.');
            }
        }

        // Run on page load
        redirect();
    </script>
</body>
</html>
