<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iteratio.nz</title>
<meta name="description" content="Clinical decision support prototyping — iteratio.nz">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --bg: #f6f4f0;
    --bg-warm: #edeae4;
    --surface: #ffffff;
    --border: #ddd8d0;
    --border-light: #e8e4de;
    --text: #2c2926;
    --text-mid: #6b6560;
    --text-light: #9e9890;
    --text-faint: #c4bfb8;
    --teal: #2a9d8f;
    --teal-soft: rgba(42,157,143,0.08);
    --teal-glow: rgba(42,157,143,0.12);
    --coral: #e07a5f;
    --coral-soft: rgba(224,122,95,0.08);
    --indigo: #4a6fa5;
    --indigo-soft: rgba(74,111,165,0.08);
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Soft background ── */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-grain {
    position: absolute;
    inset: 0;
    opacity: 0.3;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  .bg-shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    animation: shapeIn 2s ease-out forwards;
    opacity: 0;
  }
  .bg-shape.a { width: 600px; height: 600px; top: -10%; left: -5%; background: var(--teal); animation-delay: 0.2s; }
  .bg-shape.b { width: 500px; height: 500px; bottom: -15%; right: -5%; background: var(--coral); animation-delay: 0.6s; }
  .bg-shape.c { width: 300px; height: 300px; top: 40%; left: 55%; background: var(--indigo); animation-delay: 1s; }

  @keyframes shapeIn { to { opacity: 0.06; } }

  /* ── Page ── */
  .page {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .lockup {
    text-align: center;
    max-width: 720px;
  }

  /* ── Converging rings ── */
  .rings-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.2s forwards;
  }

  .rings-svg { width: 140px; height: 140px; }

  .ring {
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    opacity: 0;
  }
  .ring-1 { stroke: var(--teal); stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawRing 1.8s ease-out 0.5s forwards; }
  .ring-2 { stroke: var(--coral); stroke-dasharray: 160; stroke-dashoffset: 160; animation: drawRing 1.8s ease-out 0.8s forwards; }
  .ring-3 { stroke: var(--indigo); stroke-dasharray: 120; stroke-dashoffset: 120; animation: drawRing 1.8s ease-out 1.1s forwards; }
  .center-dot { fill: var(--teal); opacity: 0; animation: dotPulse 1s ease-out 2s forwards; }

  @keyframes drawRing { to { stroke-dashoffset: 0; opacity: 1; } }
  @keyframes dotPulse {
    0% { opacity: 0; r: 0; }
    60% { opacity: 1; r: 5; }
    100% { opacity: 1; r: 3.5; }
  }

  /* ── ECG trace ── */
  .ecg-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.8s ease-out 1.4s forwards;
  }
  .ecg-svg { width: 220px; height: 32px; }
  .ecg-path {
    fill: none;
    stroke: var(--teal);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 350;
    stroke-dashoffset: 350;
    animation: ecgCycle 4s ease-in-out 1.6s infinite;
    opacity: 0.45;
  }
  @keyframes ecgCycle {
    0%   { stroke-dashoffset: 350; }
    50%  { stroke-dashoffset: 0; }
    85%  { stroke-dashoffset: 0; opacity: 0.45; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }

  /* ── Typography ── */
  .title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: clamp(2.6rem, 7vw, 4.2rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: -0.03em;
    line-height: 1.05;
    color: var(--text);
    margin-bottom: 0.25rem;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.6s forwards;
  }
  .title .dot { font-style: normal; color: var(--teal); font-weight: 600; }

  .tagline {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.9s forwards;
  }

  /* ── Three pillars ── */
  .pillars {
    display: flex;
    gap: 1.2rem;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 1s ease-out 1.2s forwards;
  }

  .pillar {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    padding: 1.6rem 1.2rem 1.4rem;
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  }
  .pillar:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.06);
    border-color: var(--border);
  }

  .pillar-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    font-size: 1.2rem;
  }
  .pillar:nth-child(1) .pillar-icon { background: var(--teal-soft); color: var(--teal); }
  .pillar:nth-child(2) .pillar-icon { background: var(--coral-soft); color: var(--coral); }
  .pillar:nth-child(3) .pillar-icon { background: var(--indigo-soft); color: var(--indigo); }

  .pillar-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.35rem;
  }
  .pillar-desc {
    font-size: 0.68rem;
    color: var(--text-mid);
    line-height: 1.5;
    letter-spacing: 0.01em;
  }

  /* ── Status badge ── */
  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.68rem;
    font-weight: 500;
    color: var(--text-mid);
    letter-spacing: 0.04em;
    padding: 0.55rem 1.2rem;
    border: 1px solid var(--border-light);
    border-radius: 100px;
    background: var(--surface);
    opacity: 0;
    animation: fadeUp 1s ease-out 1.5s forwards;
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-soft);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px var(--teal-soft); }
    50% { box-shadow: 0 0 0 6px var(--teal-glow); }
  }

  /* ── Footer ── */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1.4rem;
    text-align: center;
    font-size: 0.62rem;
    color: var(--text-faint);
    letter-spacing: 0.08em;
    font-style: italic;
    z-index: 1;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .pillars { flex-direction: column; gap: 0.8rem; }
    .pillar { padding: 1.3rem 1rem; }
    .rings-svg { width: 110px; height: 110px; }
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-layer">
  <div class="bg-grain"></div>
  <div class="bg-shape a"></div>
  <div class="bg-shape b"></div>
  <div class="bg-shape c"></div>
</div>

<!-- Content -->
<div class="page">
  <div class="lockup">

    <!-- Converging rings -->
    <div class="rings-wrap">
      <svg class="rings-svg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
        <circle class="ring ring-1" cx="70" cy="70" r="62" />
        <circle class="ring ring-2" cx="70" cy="70" r="45" />
        <circle class="ring ring-3" cx="70" cy="70" r="28" />
        <circle class="center-dot" cx="70" cy="70" r="3.5" />
      </svg>
    </div>

    <!-- ECG trace -->
    <div class="ecg-wrap">
      <svg class="ecg-svg" viewBox="0 0 220 32" xmlns="http://www.w3.org/2000/svg">
        <path class="ecg-path" d="M0,18 L35,18 L45,18 L51,16 L55,22 L60,4 L66,30 L72,15 L78,18 L100,18 L107,13 L114,18 L140,18 L148,18 L154,16 L158,22 L163,4 L169,30 L175,15 L181,18 L198,18 L205,13 L212,18 L220,18"/>
      </svg>
    </div>

    <h1 class="title">iteratio<span class="dot">.</span>nz</h1>
    <p class="tagline">from Latin: the act of repeating, refining, iterating</p>

    <div class="pillars">
      <div class="pillar">
        <div class="pillar-icon">⟨/⟩</div>
        <div class="pillar-title">Development</div>
        <div class="pillar-desc">Web-based tools and prototypes</div>
      </div>
      <div class="pillar">
        <div class="pillar-icon">⚕</div>
        <div class="pillar-title">Clinical</div>
        <div class="pillar-desc">Decision support systems</div>
      </div>
      <div class="pillar">
        <div class="pillar-icon">◇</div>
        <div class="pillar-title">AI-Assisted</div>
        <div class="pillar-desc">Intelligent tooling and workflows</div>
      </div>
    </div>

    <div class="status">
      <span class="status-dot"></span>
      Active development — not a production service
    </div>

  </div>
</div>

<div class="footer">development environment — not a production service</div>

</body>
</html>
